<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Floating Navigation UI Component">
<title>Floating Navigation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(180deg, #0f0f17 0%, #1a1a2e 100%);
    min-height: 100vh;
    font-family: 'Plus Jakarta Sans', sans-serif;
    padding: 100px 40px 40px;
}

.floating-nav {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: rgba(24, 24, 27, 0.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 18px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    z-index: 1000;
}

.nav-item {
    position: relative;
    padding: 12px 20px;
    color: #71717a;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border-radius: 12px;
    transition: all 0.3s ease;
    cursor: pointer;
}

.nav-item:hover {
    color: #e4e4e7;
    background: rgba(255, 255, 255, 0.05);
}

.nav-item.active {
    color: #fff;
}

.nav-item .indicator {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    background: #8b5cf6;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.nav-item.active .indicator {
    opacity: 1;
}

.nav-item .badge {
    position: absolute;
    top: 6px;
    right: 8px;
    width: 8px;
    height: 8px;
    background: #ef4444;
    border-radius: 50%;
    border: 2px solid #18181b;
}

.logo {
    padding: 10px 16px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #8b5cf6, #c084fc);
    border-radius: 10px;
    margin-right: 8px;
}

.divider {
    width: 1px;
    height: 28px;
    background: rgba(255, 255, 255, 0.1);
    margin: 0 8px;
}

.content {
    max-width: 800px;
    margin: 0 auto;
}

.content h1 {
    color: #f4f4f5;
    font-size: 42px;
    font-weight: 700;
    margin-bottom: 16px;
}

.content p {
    color: #a1a1aa;
    font-size: 18px;
    line-height: 1.7;
}
</style>
</head>
<body>

<nav class="floating-nav">
    <div class="logo">⚡</div>
    <a href="#" class="nav-item active">
        Home
        <span class="indicator"></span>
    </a>
    <a href="#" class="nav-item">
        Dashboard
        <span class="badge"></span>
    </a>
    <a href="#" class="nav-item">Projects</a>
    <a href="#" class="nav-item">Team</a>
    <div class="divider"></div>
    <a href="#" class="nav-item">Settings</a>
</nav>

<div class="content">
    <h1>Floating Navigation</h1>
    <p>A modern floating navigation bar with glassmorphism effect, smooth transitions, and indicator dots for active states.</p>
</div>

</body>
</html>
