<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Navigation Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        .circular-nav {
            position: relative;
            width: 300px;
            height: 300px;
        }

        .center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .center-btn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .center-btn svg {
            width: 30px;
            height: 30px;
            fill: white;
            transition: transform 0.4s ease;
        }

        .center-btn.active svg {
            transform: rotate(45deg);
        }

        .nav-item {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transform: scale(0);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-decoration: none;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: white;
            transition: transform 0.3s ease;
        }

        .nav-item:hover svg {
            transform: scale(1.2) rotate(360deg);
        }

        .nav-item:nth-child(1) { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .nav-item:nth-child(2) { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .nav-item:nth-child(3) { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .nav-item:nth-child(4) { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .nav-item:nth-child(5) { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .nav-item:nth-child(6) { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }

        .circular-nav.active .nav-item {
            opacity: 1;
            transform: scale(1);
        }

        .circular-nav.active .nav-item:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
        .circular-nav.active .nav-item:nth-child(2) { top: 25%; right: 0; }
        .circular-nav.active .nav-item:nth-child(3) { top: 75%; right: 0; }
        .circular-nav.active .nav-item:nth-child(4) { bottom: 0; left: 50%; transform: translateX(-50%); }
        .circular-nav.active .nav-item:nth-child(5) { top: 75%; left: 0; }
        .circular-nav.active .nav-item:nth-child(6) { top: 25%; left: 0; }

        .tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            color: #0a0a0f;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(10px);
            transition: all 0.3s ease;
            left: 50%;
            top: -40px;
        }

        .nav-item:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .orbiting-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 2px dashed rgba(102, 126, 234, 0.2);
            border-radius: 50%;
            animation: orbit 20s linear infinite;
            pointer-events: none;
        }

        @keyframes orbit {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="circular-nav">
        <div class="orbiting-ring"></div>
        
        <a href="#" class="nav-item">
            <span class="tooltip">Home</span>
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </a>
        <a href="#" class="nav-item">
            <span class="tooltip">Search</span>
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </a>
        <a href="#" class="nav-item">
            <span class="tooltip">Notifications</span>
            <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        </a>
        <a href="#" class="nav-item">
            <span class="tooltip">Messages</span>
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
        </a>
        <a href="#" class="nav-item">
            <span class="tooltip">Settings</span>
            <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </a>
        <a href="#" class="nav-item">
            <span class="tooltip">Profile</span>
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </a>

        <button class="center-btn">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
    </div>

    <script>
        const centerBtn = document.querySelector('.center-btn');
        const circularNav = document.querySelector('.circular-nav');

        centerBtn.addEventListener('click', () => {
            centerBtn.classList.toggle('active');
            circularNav.classList.toggle('active');
        });
    </script>
</body>
</html>
