<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Neon Grid Footer UI Component">
<title>Neon Grid Footer</title>
<style>
body {
    background: #080808;
    padding: 40px;
    margin: 0;
}

.neon-footer {
    background: #0a0a0f;
    border-top: 1px solid #222;
    padding: 60px 40px 30px;
    position: relative;
    overflow: hidden;
}

.neon-footer::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #0ff, transparent);
}

.footer-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 40px;
    max-width: 1200px;
    margin: 0 auto;
}

.footer-col h4 {
    margin: 0 0 20px;
    color: #0ff;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.footer-col ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.footer-col li {
    margin-bottom: 12px;
}

.footer-col a {
    color: #888;
    text-decoration: none;
    font-size: 14px;
    transition: color 0.3s;
}

.footer-col a:hover {
    color: #fff;
    text-shadow: 0 0 10px #0ff;
}

.footer-bottom {
    text-align: center;
    padding-top: 40px;
    margin-top: 40px;
    border-top: 1px solid #1a1a1a;
    color: #555;
    font-size: 12px;
}
</style>
</head>
<body>

<footer class="neon-footer">
    <div class="footer-grid">
        <div class="footer-col">
            <h4>Product</h4>
            <ul>
                <li><a href="#">Features</a></li>
                <li><a href="#">Pricing</a></li>
                <li><a href="#">Integrations</a></li>
            </ul>
        </div>
        <div class="footer-col">
            <h4>Company</h4>
            <ul>
                <li><a href="#">About</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Careers</a></li>
            </ul>
        </div>
        <div class="footer-col">
            <h4>Support</h4>
            <ul>
                <li><a href="#">Help Center</a></li>
                <li><a href="#">Documentation</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
        <div class="footer-col">
            <h4>Legal</h4>
            <ul>
                <li><a href="#">Privacy</a></li>
                <li><a href="#">Terms</a></li>
                <li><a href="#">Security</a></li>
            </ul>
        </div>
    </div>
    <div class="footer-bottom">
        &copy; 2026 Your Company. All rights reserved.
    </div>
</footer>

</body>
</html>
