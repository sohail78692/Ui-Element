  <meta name="description" content="Social Pill Footer">

    .social-pill {
      transition: all 0.3s ease;
    }

    .social-pill:hover {
      transform: translateY(-3px);
    }

    .social-pill svg {
      transition: transform 0.3s ease;
    }

    .social-pill:hover svg {
      transform: scale(1.2);
    }
  </style>
</head>
