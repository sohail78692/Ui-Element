<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Glass Navbar UI Component">
<title>Glass Navbar</title>
<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
}

.glass-navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.glass-navbar .logo {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
}

.glass-navbar .nav-links {
    display: flex;
    gap: 24px;
    list-style: none;
    margin: 0;
    padding: 0;
}

.glass-navbar .nav-links a {
    color: rgba(255, 255, 255, 0.8);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
}

.glass-navbar .nav-links a:hover {
    color: #fff;
}

.glass-navbar .cta {
    padding: 8px 20px;
    background: rgba(255, 255, 255, 0.2);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
}

.glass-navbar .cta:hover {
    background: rgba(255, 255, 255, 0.3);
}
</style>
</head>
<body>

<nav class="glass-navbar">
    <div class="logo">Acme</div>
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">About</a></li>
    </ul>
    <button class="cta">Sign In</button>
</nav>

</body>
</html>
