<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Battery Status Dashboard Widget">
  <title>Battery Status Widget</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .battery-level {
      transition: width 0.5s ease;
    }

    .charging-pulse {
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .battery-icon {
      filter: drop-shadow(0 0 8px currentColor);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100 p-6">

  <div class="bg-white rounded-3xl shadow-2xl p-8 w-80 border border-gray-100">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-lg font-bold text-gray-800">Battery Status</h3>
      <span class="charging-badge flex items-center gap-1 px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium">
        <svg class="w-4 h-4 charging-pulse" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/>
        </svg>
        Charging
      </span>
    </div>

    <div class="flex items-end gap-4 mb-6">
      <div class="relative">
        <div class="w-32 h-16 bg-gray-200 rounded-2xl border-4 border-gray-300 p-1">
          <div class="battery-level h-full bg-gradient-to-r from-green-400 to-green-500 rounded-xl w-[73%] relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-b from-white/30 to-transparent"></div>
          </div>
        </div>
        <div class="absolute -right-3 top-1/2 -translate-y-1/2 w-2 h-8 bg-gray-300 rounded-r"></div>
      </div>
      <div>
        <p class="text-4xl font-bold text-gray-800">73%</p>
        <p class="text-sm text-gray-500">Time remaining</p>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-4">
      <div class="bg-gray-50 rounded-xl p-4 text-center">
        <svg class="w-6 h-6 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        <p class="text-xs text-gray-500">Power</p>
        <p class="text-sm font-semibold text-gray-800">45W</p>
      </div>
      <div class="bg-gray-50 rounded-xl p-4 text-center">
        <svg class="w-6 h-6 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-xs text-gray-500">Time</p>
        <p class="text-sm font-semibold text-gray-800">2:15</p>
      </div>
      <div class="bg-gray-50 rounded-xl p-4 text-center">
        <svg class="w-6 h-6 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <p class="text-xs text-gray-500">Health</p>
        <p class="text-sm font-semibold text-gray-800">98%</p>
      </div>
    </div>

    <div class="mt-6 pt-4 border-t border-gray-100">
      <div class="flex items-center justify-between text-sm">
        <span class="text-gray-500">Battery Health</span>
        <span class="text-green-600 font-medium">Excellent</span>
      </div>
    </div>
  </div>

</body>

</html>
