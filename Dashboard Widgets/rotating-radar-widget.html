<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotating Radar Widget</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0e17;
            font-family: 'Rajdhani', sans-serif;
        }
        
        .radar-widget {
            position: relative;
            width: 340px;
            height: 380px;
            background: linear-gradient(180deg, #0d1421 0%, #0a0e17 100%);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 170, 0.15);
            padding: 25px;
            overflow: hidden;
        }
        
        .radar-widget::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 170, 0.5), transparent);
        }
        
        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .widget-title {
            font-size: 16px;
            font-weight: 600;
            color: #00ffaa;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .radar-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ffaa;
            border-radius: 50%;
            animation: blink 1.5s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .status-text {
            font-size: 12px;
            color: rgba(0, 255, 170, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .radar-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto;
        }
        
        .radar-sweep {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 270deg, rgba(0, 255, 170, 0.4) 360deg);
            animation: sweep 3s linear infinite;
        }
        
        @keyframes sweep {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        .radar-rings {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 170, 0.2);
        }
        
        .radar-rings::before,
        .radar-rings::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 170, 0.15);
        }
        
        .radar-rings::before {
            width: 140px;
            height: 140px;
        }
        
        .radar-rings::after {
            width: 80px;
            height: 80px;
        }
        
        .radar-cross {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
        }
        
        .radar-cross::before,
        .radar-cross::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 170, 0.15);
        }
        
        .radar-cross::before {
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            transform: translateY(-50%);
        }
        
        .radar-cross::after {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            transform: translateX(-50%);
        }
        
        .radar-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: #00ffaa;
            border-radius: 50%;
            box-shadow: 0 0 20px #00ffaa, 0 0 40px rgba(0, 255, 170, 0.5);
        }
        
        .radar-blip {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ff6b6b;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff6b6b;
            animation: blip-pulse 1.5s ease-in-out infinite;
        }
        
        .blip-1 { top: 30%; left: 60%; animation-delay: 0s; }
        .blip-2 { top: 65%; left: 25%; animation-delay: 0.5s; }
        .blip-3 { top: 45%; left: 70%; animation-delay: 1s; }
        
        @keyframes blip-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }
        
        .radar-labels {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .radar-label {
            position: absolute;
            font-size: 10px;
            color: rgba(0, 255, 170, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .label-1 { top: 5px; left: 50%; transform: translateX(-50%); }
        .label-2 { top: 50%; right: -5px; transform: translateY(-50%); }
        .label-3 { bottom: 5px; left: 50%; transform: translateX(-50%); }
        .label-4 { top: 50%; left: -15px; transform: translateY(-50%); }
        
        .radar-data {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 255, 170, 0.1);
        }
        
        .data-item {
            text-align: center;
        }
        
        .data-value {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }
        
        .data-label {
            font-size: 10px;
            color: rgba(0, 255, 170, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 170, 0.3), transparent);
            animation: scan 2s linear infinite;
        }
        
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="radar-widget">
        <div class="scan-line"></div>
        <div class="widget-header">
            <span class="widget-title">Radar</span>
            <div class="radar-status">
                <div class="status-dot"></div>
                <span class="status-text">Active</span>
            </div>
        </div>
        <div class="radar-container">
            <div class="radar-rings"></div>
            <div class="radar-cross"></div>
            <div class="radar-sweep"></div>
            <div class="radar-center"></div>
            <div class="radar-blip blip-1"></div>
            <div class="radar-blip blip-2"></div>
            <div class="radar-blip blip-3"></div>
            <div class="radar-labels">
                <span class="radar-label label-1">0°</span>
                <span class="radar-label label-2">90°</span>
                <span class="radar-label label-3">180°</span>
                <span class="radar-label label-4">270°</span>
            </div>
        </div>
        <div class="radar-data">
            <div class="data-item">
                <div class="data-value">12</div>
                <div class="data-label">Targets</div>
            </div>
            <div class="data-item">
                <div class="data-value">4.2</div>
                <div class="data-label">Range</div>
            </div>
            <div class="data-item">
                <div class="data-value">98%</div>
                <div class="data-label">Signal</div>
            </div>
        </div>
    </div>
</body>
</html>
