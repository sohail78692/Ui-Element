<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Icon Badge Button UI Component">
<title>Icon Badge Button</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');

body {
    background: #0f0f14;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    padding: 40px;
    font-family: 'Inter', sans-serif;
}

.icon-badge-btn {
    position: relative;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 16px;
    cursor: pointer;
    font-size: 22px;
    color: #a1a1aa;
    transition: all 0.3s ease;
}

.icon-badge-btn:hover {
    transform: translateY(-4px);
    border-color: #3f3f46;
    color: #e4e4e7;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
}

.icon-badge-btn .badge {
    position: absolute;
    top: -6px;
    right: -6px;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    background: #ef4444;
    border-radius: 10px;
    border: 2px solid #0f0f14;
}

.icon-badge-btn .badge.purple {
    background: #8b5cf6;
}

.icon-badge-btn .badge.green {
    background: #10b981;
}

.icon-badge-btn .badge.amber {
    background: #f59e0b;
}

.icon-badge-btn.large {
    width: 64px;
    height: 64px;
    font-size: 26px;
    border-radius: 18px;
}

.icon-badge-btn.large .badge {
    min-width: 24px;
    height: 24px;
    font-size: 12px;
    border-radius: 12px;
    top: -8px;
    right: -8px;
}
</style>
</head>
<body>

<button class="icon-badge-btn">
    🔔
    <span class="badge">3</span>
</button>

<button class="icon-badge-btn">
    💬
    <span class="badge purple">12</span>
</button>

<button class="icon-badge-btn">
    📧
    <span class="badge green">5</span>
</button>

<button class="icon-badge-btn">
    ⚙️
    <span class="badge amber">2</span>
</button>

<button class="icon-badge-btn large">
    🔔
    <span class="badge">7</span>
</button>

</body>
</html>
