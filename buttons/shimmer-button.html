<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Shimmer Button UI Component">
<title>Shimmer Button</title>
<style>
body {
    background: #0d0d12;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.shimmer-btn {
    position: relative;
    padding: 14px 40px;
    background: linear-gradient(135deg, #1f1f2e, #2d2d42);
    border: 1px solid #3d3d55;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.3s ease;
}

.shimmer-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s ease;
}

.shimmer-btn:hover::before {
    left: 100%;
}

.shimmer-btn:hover {
    border-color: #6366f1;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
}
</style>
</head>
<body>

<button type="button" class="shimmer-btn">Get Started</button>

</body>
</html>
