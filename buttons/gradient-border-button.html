<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Border Button</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d0d12;
            gap: 20px;
        }
        .gradient-btn {
            position: relative;
            padding: 16px 32px;
            background: #12121a;
            border: none;
            border-radius: 14px;
            font-family: system-ui, sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .gradient-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            padding: 2px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899, #3b82f6);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            transition: opacity 0.3s;
        }
        .gradient-btn:hover::before { opacity: 0; }
        .gradient-btn:hover {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }
    </style>
</head>
<body>
    <button class="gradient-btn">Get Started</button>
    <button class="gradient-btn" style="background: linear-gradient(135deg, #8b5cf6, #ec4899);">Premium</button>
</body>
</html>
