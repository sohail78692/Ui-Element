<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Nebula Button UI Component">
<title>Nebula Button</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap');

body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    padding: 40px;
    font-family: 'Space Grotesk', sans-serif;
}

.btn-nebula {
    position: relative;
    padding: 18px 42px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: transparent;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.4s ease;
}

.btn-nebula::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 14px;
    padding: 2px;
    background: linear-gradient(135deg, #c084fc, #6366f1, #06b6d4, #c084fc);
    background-size: 300% 300%;
    animation: nebula-glow 3s ease infinite;
    -webkit-mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
}

.btn-nebula::after {
    content: '';
    position: absolute;
    inset: 2px;
    background: linear-gradient(135deg, #1e1e2e, #18181f);
    border-radius: 12px;
    z-index: -1;
    transition: all 0.3s ease;
}

.btn-nebula:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(139, 92, 246, 0.3);
}

.btn-nebula:hover::after {
    background: linear-gradient(135deg, #2e2e3e, #1f1f2a);
}

@keyframes nebula-glow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

.btn-nebula .stars {
    position: absolute;
    inset: 0;
    overflow: hidden;
    border-radius: 14px;
    pointer-events: none;
}

.btn-nebula .star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle 1.5s ease-in-out infinite;
}

@keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1); }
}

.btn-nebula.secondary::before {
    background: linear-gradient(135deg, #f472b6, #ec4899, #f59e0b, #f472b6);
}

.btn-nebula.tertiary::before {
    background: linear-gradient(135deg, #10b981, #06b6d4, #3b82f6, #10b981);
}
</style>
</head>
<body>

<button class="btn-nebula">
    <span class="stars">
        <span class="star" style="top: 20%; left: 30%; animation-delay: 0s;"></span>
        <span class="star" style="top: 60%; left: 70%; animation-delay: 0.3s;"></span>
        <span class="star" style="top: 40%; left: 50%; animation-delay: 0.6s;"></span>
        <span class="star" style="top: 75%; left: 25%; animation-delay: 0.9s;"></span>
    </span>
    Launch Now
</button>

<button class="btn-nebula secondary">
    <span class="stars">
        <span class="star" style="top: 25%; left: 35%; animation-delay: 0.2s;"></span>
        <span class="star" style="top: 55%; left: 65%; animation-delay: 0.5s;"></span>
    </span>
    Explore
</button>

<button class="btn-nebula tertiary">
    <span class="stars">
        <span class="star" style="top: 30%; left: 40%; animation-delay: 0.1s;"></span>
        <span class="star" style="top: 65%; left: 75%; animation-delay: 0.4s;"></span>
    </span>
    Get Started
</button>

</body>
</html>
