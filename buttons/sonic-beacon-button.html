<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Beacon Button</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09111f;
            --panel: rgba(8, 16, 31, 0.78);
            --line: rgba(131, 175, 255, 0.18);
            --text: #eff5ff;
            --muted: #8da2c9;
            --cyan: #5df2e6;
            --blue: #6aa6ff;
            --amber: #ffbf69;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            font-family: "Sora", sans-serif;
            color: var(--text);
            background:
                radial-gradient(36rem 20rem at 15% 20%, rgba(93, 242, 230, 0.16), transparent 60%),
                radial-gradient(40rem 24rem at 82% 14%, rgba(106, 166, 255, 0.22), transparent 58%),
                radial-gradient(34rem 18rem at 50% 100%, rgba(255, 191, 105, 0.14), transparent 62%),
                linear-gradient(160deg, #050b14, #0a1220 48%, #07101e);
        }

        .wrap {
            display: grid;
            gap: 0.95rem;
            justify-items: center;
        }

        .button {
            position: relative;
            width: min(100%, 18rem);
            border: 1px solid var(--line);
            border-radius: 1.6rem;
            padding: 1rem 1.05rem;
            overflow: hidden;
            cursor: pointer;
            color: inherit;
            background:
                linear-gradient(140deg, rgba(106, 166, 255, 0.18), rgba(93, 242, 230, 0.1)),
                var(--panel);
            box-shadow:
                0 24px 55px rgba(8, 14, 27, 0.46),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
        }

        .button:hover,
        .button:focus-visible {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(93, 242, 230, 0.34);
            box-shadow:
                0 30px 65px rgba(8, 14, 27, 0.54),
                0 0 0 1px rgba(93, 242, 230, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
            outline: none;
        }

        .button::before,
        .button::after {
            content: "";
            position: absolute;
            inset: auto;
            border-radius: 999px;
            pointer-events: none;
        }

        .button::before {
            width: 13rem;
            height: 13rem;
            right: -4rem;
            top: -6rem;
            background: radial-gradient(circle, rgba(93, 242, 230, 0.26), transparent 66%);
        }

        .button::after {
            width: 10rem;
            height: 10rem;
            left: -4.5rem;
            bottom: -5.5rem;
            background: radial-gradient(circle, rgba(255, 191, 105, 0.22), transparent 68%);
        }

        .shell {
            position: relative;
            display: grid;
            gap: 0.95rem;
            z-index: 1;
        }

        .topline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.34rem 0.58rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.72rem;
            color: rgba(239, 245, 255, 0.88);
        }

        .status-dot {
            width: 0.46rem;
            aspect-ratio: 1;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 0 0 rgba(93, 242, 230, 0.5);
            animation: ping 1.8s ease-out infinite;
        }

        .title {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(1.2rem, 3vw, 1.48rem);
            line-height: 1.05;
            letter-spacing: -0.03em;
        }

        .copy {
            max-width: 25ch;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.55;
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.8rem;
            align-items: center;
        }

        .track {
            position: relative;
            height: 0.75rem;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .fill {
            height: 100%;
            width: 72%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--cyan), var(--blue), var(--amber));
            box-shadow: 0 0 26px rgba(93, 242, 230, 0.32);
            transform-origin: left center;
            animation: sweep 2.7s ease-in-out infinite;
        }

        .metric-value {
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
        }

        .hint {
            font-size: 0.78rem;
            color: rgba(239, 245, 255, 0.62);
            letter-spacing: 0.03em;
        }

        @keyframes ping {
            0% {
                box-shadow: 0 0 0 0 rgba(93, 242, 230, 0.45);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(93, 242, 230, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(93, 242, 230, 0);
            }
        }

        @keyframes sweep {
            0%,
            100% {
                transform: scaleX(0.86);
                filter: saturate(0.92);
            }

            50% {
                transform: scaleX(1);
                filter: saturate(1.08);
            }
        }

        @media (max-width: 520px) {
            .button {
                border-radius: 1.35rem;
                padding: 0.9rem;
            }

            .metrics {
                grid-template-columns: 1fr;
            }

            .metric-value {
                justify-self: end;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <button class="button" type="button" aria-label="Launch sonic relay">
            <span class="shell">
                <span class="topline">
                    <span class="label">Fleet uplink</span>
                    <span class="status">
                        <span class="status-dot"></span>
                        Live
                    </span>
                </span>
                <span class="title">Trigger Sonic Beacon</span>
                <span class="copy">Broadcast a short-range pulse to nearby operators and lock the emergency rendezvous lane.</span>
                <span class="metrics">
                    <span class="track" aria-hidden="true">
                        <span class="fill"></span>
                    </span>
                    <span class="metric-value">72%</span>
                </span>
            </span>
        </button>
        <p class="hint">Hover or focus to lift the beacon shell and intensify the signal glow.</p>
    </div>
</body>

</html>
