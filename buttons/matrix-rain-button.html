<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Matrix Rain Button UI Component">
<title>Matrix Rain Button</title>
<style>
body {
    background: #0a0a0a;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.matrix-btn {
    position: relative;
    padding: 16px 48px;
    background: #000;
    color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    font-weight: bold;
    border: 2px solid #0f0;
    border-radius: 4px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.matrix-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.3), transparent);
    animation: matrix-scan 2s infinite;
}

@keyframes matrix-scan {
    0% { left: -100%; }
    100% { left: 100%; }
}

.matrix-btn:hover {
    background: #0f0;
    color: #000;
    box-shadow: 0 0 30px #0f0, 0 0 60px #0f0;
}

.matrix-btn:active {
    transform: scale(0.95);
}
</style>
</head>
<body>

<button type="button" class="matrix-btn">Enter The Matrix</button>

</body>
</html>
