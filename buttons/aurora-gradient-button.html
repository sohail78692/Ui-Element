<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Aurora Gradient Button UI Component">
<title>Aurora Gradient Button</title>
<style>
body {
    background: #0a0a12;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.aurora-btn {
    position: relative;
    padding: 16px 48px;
    border: none;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    border-radius: 50px;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.3s ease;
}

.aurora-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(120, 200, 255, 0.3), transparent);
    transition: left 0.5s ease;
}

.aurora-btn:hover::before {
    left: 100%;
}

.aurora-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(100, 200, 255, 0.2);
}

.aurora-btn span {
    position: relative;
    z-index: 1;
}
</style>
</head>
<body>

<button type="button" class="aurora-btn">
    <span>Explore Now</span>
</button>

</body>
</html>
