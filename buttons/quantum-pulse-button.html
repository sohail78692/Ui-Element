<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Pulse Button</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap');

        :root {
            --qp-teal: #00ffd5;
            --qp-purple: #a855f7;
            --qp-pink: #ec4899;
            --qp-bg: #0a0a0f;
            --qp-surface: #12121a;
            --qp-border: #1e1e2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
            padding: 24px;
            background: var(--qp-bg);
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(0, 255, 213, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
        }

        .qp-btn {
            position: relative;
            padding: 18px 36px;
            background: var(--qp-surface);
            border: 1px solid var(--qp-border);
            border-radius: 12px;
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .qp-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(0, 255, 213, 0.1) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .qp-btn:hover::before {
            transform: translateX(100%);
        }

        .qp-btn:hover {
            border-color: var(--qp-teal);
            box-shadow: 0 0 30px rgba(0, 255, 213, 0.2), inset 0 0 20px rgba(0, 255, 213, 0.05);
        }

        .qp-btn::after {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--qp-teal), var(--qp-purple), var(--qp-pink));
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s ease;
        }

        .qp-btn:hover::after {
            opacity: 1;
        }

        .qp-btn span {
            position: relative;
            z-index: 1;
        }

        .qp-glow {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--qp-teal) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .qp-btn:active .qp-glow {
            opacity: 0.4;
            transform: scale(2);
        }

        .qp-orbit {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 1px dashed rgba(0, 255, 213, 0.3);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .qp-btn:hover .qp-orbit {
            opacity: 1;
            animation: orbit-spin 4s linear infinite;
        }

        @keyframes orbit-spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .qp-btn-secondary {
            --qp-teal: #fb923c;
            --qp-purple: #f472b6;
        }

        .qp-btn-secondary:hover {
            border-color: var(--qp-teal);
            box-shadow: 0 0 30px rgba(251, 146, 60, 0.2), inset 0 0 20px rgba(251, 146, 60, 0.05);
        }
    </style>
</head>
<body>
    <button class="qp-btn">
        <span>Initialize</span>
        <div class="qp-glow"></div>
        <div class="qp-orbit"></div>
    </button>
    <button class="qp-btn">
        <span>Deploy</span>
        <div class="qp-glow"></div>
        <div class="qp-orbit"></div>
    </button>
    <button class="qp-btn qp-btn-secondary">
        <span>Execute</span>
        <div class="qp-glow"></div>
        <div class="qp-orbit"></div>
    </button>
</body>
</html>
