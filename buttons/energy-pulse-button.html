<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Energy Pulse Button UI Component">
    <title>Energy Pulse Button</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            gap: 30px;
            flex-wrap: wrap;
            padding: 40px;
        }

        .energy-btn {
            position: relative;
            padding: 18px 48px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid transparent;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Segoe UI', sans-serif;
        }

        .energy-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .energy-btn:hover::before {
            left: 100%;
        }

        .energy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.5),
                        0 0 60px rgba(0, 255, 200, 0.3);
            border-color: #00ffc8;
        }

        .energy-btn .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border: 2px solid #00ffc8;
            border-radius: 50%;
            opacity: 0;
            animation: pulse-ring 2s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% {
                width: 100%;
                height: 100%;
                opacity: 0.8;
            }
            100% {
                width: 200%;
                height: 200%;
                opacity: 0;
            }
        }

        .energy-btn.secondary {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0a2e 100%);
        }

        .energy-btn.secondary:hover {
            box-shadow: 0 0 30px rgba(180, 100, 255, 0.5),
                        0 0 60px rgba(180, 100, 255, 0.3);
            border-color: #b464ff;
        }

        .energy-btn.secondary .pulse-ring {
            border-color: #b464ff;
        }

        .energy-btn.tertiary {
            background: linear-gradient(135deg, #4a1942 0%, #2d0a1e 100%);
        }

        .energy-btn.tertiary:hover {
            box-shadow: 0 0 30px rgba(255, 100, 150, 0.5),
                        0 0 60px rgba(255, 100, 150, 0.3);
            border-color: #ff6496;
        }

        .energy-btn.tertiary .pulse-ring {
            border-color: #ff6496;
        }
    </style>
</head>
<body>
    <button class="energy-btn">
        <span class="pulse-ring"></span>
        Activate
    </button>

    <button class="energy-btn secondary">
        <span class="pulse-ring"></span>
        Launch
    </button>

    <button class="energy-btn tertiary">
        <span class="pulse-ring"></span>
        Discover
    </button>
</body>
</html>
