<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Icon Button UI Component">
<title>Icon Button</title>
<style>
body {
    background: #0c0c10;
    padding: 40px;
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.icon-btn {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    color: #888;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.icon-btn:hover {
    background: #252532;
    border-color: #3a3a4a;
    color: #fff;
    transform: translateY(-2px);
}

.icon-btn.primary {
    background: #6366f1;
    border-color: #6366f1;
    color: #fff;
}

.icon-btn.primary:hover {
    background: #4f46e5;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
}
</style>
</head>
<body>

<button type="button" class="icon-btn">✕</button>
<button type="button" class="icon-btn">★</button>
<button type="button" class="icon-btn primary">+</button>

</body>
</html>
