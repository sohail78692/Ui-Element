<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Social Button Group UI Component">
<title>Social Button Group</title>
<style>
body {
    background: #0c0c10;
    padding: 40px;
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.social-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    color: #888;
    font-size: 16px;
    text-decoration: none;
    transition: all 0.2s ease;
}

.social-btn:hover {
    transform: translateY(-3px);
}

.social-btn.twitter:hover {
    background: #1da1f2;
    border-color: #1da1f2;
    color: #fff;
}

.social-btn.github:hover {
    background: #333;
    border-color: #333;
    color: #fff;
}

.social-btn.linkedin:hover {
    background: #0077b5;
    border-color: #0077b5;
    color: #fff;
}
</style>
</head>
<body>

<a href="#" class="social-btn twitter">X</a>
<a href="#" class="social-btn github">G</a>
<a href="#" class="social-btn linkedin">in</a>

</body>
</html>
