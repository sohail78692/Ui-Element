<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Glow Button UI Component">
<title>Glow Button</title>
<style>
body {
    background: #08080c;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.glow-btn {
    position: relative;
    padding: 14px 36px;
    background: #111118;
    border: none;
    color: #22d3ee;
    font-size: 15px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    z-index: 1;
}

.glow-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    background: linear-gradient(135deg, #22d3ee, #06b6d4);
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.glow-btn::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 12px;
    background: linear-gradient(135deg, #22d3ee, #06b6d4);
    z-index: -2;
    filter: blur(15px);
    opacity: 0.5;
    transition: opacity 0.3s ease;
}

.glow-btn:hover::before {
    opacity: 1;
}

.glow-btn:hover::after {
    opacity: 0.8;
}

.glow-btn:hover {
    color: #fff;
}
</style>
</head>
<body>

<button type="button" class="glow-btn">Download</button>

</body>
</html>
