<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" description="Nebula Pulse Loader UI Component">
    <title>Nebula Pulse Loader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a12 100%);
            font-family: 'Outfit', sans-serif;
        }
        
        .nebula-loader {
            position: relative;
            width: 100px;
            height: 100px;
        }
        
        .nebula-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
        }
        
        .nebula-ring:nth-child(1) {
            border-top-color: #f472b6;
            border-right-color: #f472b6;
            animation: spin 1s linear infinite;
        }
        
        .nebula-ring:nth-child(2) {
            inset: 12px;
            border-left-color: #a855f7;
            border-bottom-color: #a855f7;
            animation: spin 1.5s linear infinite reverse;
        }
        
        .nebula-ring:nth-child(3) {
            inset: 24px;
            border-top-color: #38bdf8;
            animation: spin 0.8s linear infinite;
        }
        
        .nebula-ring:nth-child(4) {
            inset: 36px;
            background: radial-gradient(circle, #f472b6 0%, #a855f7 50%, transparent 70%);
            animation: pulse 1.2s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1); }
        }
        
        .nebula-glow {
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.2) 0%, transparent 60%);
            animation: glow-rotate 4s linear infinite;
        }
        
        @keyframes glow-rotate {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="nebula-loader">
        <div class="nebula-glow"></div>
        <div class="nebula-ring"></div>
        <div class="nebula-ring"></div>
        <div class="nebula-ring"></div>
        <div class="nebula-ring"></div>
    </div>
</body>
</html>
