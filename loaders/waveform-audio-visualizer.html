<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waveform Audio Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
        }
        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 120px;
            padding: 20px;
        }
        .bar {
            width: 6px;
            background: linear-gradient(to top, #8b5cf6, #ec4899);
            border-radius: 3px;
            animation: wave 1.2s ease-in-out infinite;
        }
        .bar:nth-child(1) { height: 30%; animation-delay: 0s; }
        .bar:nth-child(2) { height: 50%; animation-delay: 0.1s; }
        .bar:nth-child(3) { height: 70%; animation-delay: 0.2s; }
        .bar:nth-child(4) { height: 90%; animation-delay: 0.3s; }
        .bar:nth-child(5) { height: 100%; animation-delay: 0.4s; }
        .bar:nth-child(6) { height: 85%; animation-delay: 0.5s; }
        .bar:nth-child(7) { height: 65%; animation-delay: 0.6s; }
        .bar:nth-child(8) { height: 45%; animation-delay: 0.7s; }
        .bar:nth-child(9) { height: 25%; animation-delay: 0.8s; }
        .bar:nth-child(10) { height: 40%; animation-delay: 0.9s; }
        .bar:nth-child(11) { height: 60%; animation-delay: 1.0s; }
        .bar:nth-child(12) { height: 80%; animation-delay: 1.1s; }
        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.5); }
        }
    </style>
</head>
<body>
    <div class="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
</body>
</html>
