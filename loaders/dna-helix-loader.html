<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Helix Loader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a12;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        .dna-container {
            position: relative;
            width: 80px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .helix {
            position: relative;
            width: 60px;
            height: 180px;
            animation: helixRotate 3s linear infinite;
        }

        .strand {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
        }

        .strand-1 {
            background: #00f5ff;
            box-shadow: 0 0 15px #00f5ff, 0 0 30px #00f5ff;
            animation: strand1Move 1.5s ease-in-out infinite;
        }

        .strand-2 {
            background: #ff00ff;
            box-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff;
            animation: strand2Move 1.5s ease-in-out infinite;
        }

        .connector {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            animation: connectorExpand 1.5s ease-in-out infinite;
        }

        @keyframes strand1Move {
            0%, 100% {
                top: 0;
            }
            25% {
                top: 30%;
                left: 10%;
            }
            50% {
                top: 50%;
                left: 50%;
            }
            75% {
                top: 70%;
                left: 10%;
            }
        }

        @keyframes strand2Move {
            0%, 100% {
                top: 100%;
            }
            25% {
                top: 70%;
                left: 90%;
            }
            50% {
                top: 50%;
                left: 50%;
            }
            75% {
                top: 30%;
                left: 90%;
            }
        }

        @keyframes connectorExpand {
            0%, 100% {
                width: 0;
                top: 50%;
            }
            25% {
                width: 40px;
                top: 30%;
            }
            50% {
                width: 60px;
                top: 50%;
            }
            75% {
                width: 40px;
                top: 70%;
            }
        }

        @keyframes helixRotate {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }

        .dna-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: particleFloat 2s ease-in-out infinite;
        }

        .dna-particle:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
        .dna-particle:nth-child(2) { top: 30%; right: 20%; animation-delay: 0.3s; }
        .dna-particle:nth-child(3) { top: 50%; left: 10%; animation-delay: 0.6s; }
        .dna-particle:nth-child(4) { top: 70%; right: 10%; animation-delay: 0.9s; }
        .dna-particle:nth-child(5) { top: 90%; left: 30%; animation-delay: 1.2s; }

        @keyframes particleFloat {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.5);
            }
        }

        .loading-text {
            position: absolute;
            bottom: -50px;
            color: #00f5ff;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: textPulse 2s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>

<body>
    <div class="dna-container">
        <div class="helix">
            <div class="strand strand-1"></div>
            <div class="strand strand-2"></div>
            <div class="connector"></div>
            <div class="dna-particle"></div>
            <div class="dna-particle"></div>
            <div class="dna-particle"></div>
            <div class="dna-particle"></div>
            <div class="dna-particle"></div>
        </div>
        <div class="loading-text">Sequencing</div>
    </div>
</body>

</html>
