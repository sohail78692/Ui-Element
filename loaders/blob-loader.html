<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Blob Loader UI Component">
<title>Blob Loader</title>
<style>
body {
    background: #0b0b0f;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.blob-loader {
    position: relative;
    width: 80px;
    height: 80px;
}

.blob-loader .blob {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    filter: blur(8px);
    animation: blob-pulse 1.5s ease-in-out infinite;
}

.blob-loader .blob:nth-child(1) {
    background: #f472b6;
    animation-delay: 0s;
}

.blob-loader .blob:nth-child(2) {
    background: #8b5cf6;
    animation-delay: 0.2s;
}

.blob-loader .blob:nth-child(3) {
    background: #06b6d4;
    animation-delay: 0.4s;
}

@keyframes blob-pulse {
    0%, 100% { transform: scale(0.8); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 1; }
}
</style>
</head>
<body>

<div class="blob-loader">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
</div>

</body>
</html>
