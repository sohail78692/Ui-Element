<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Pulse Glow Loader UI Component">
<title>Pulse Glow Loader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap');

body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Outfit', sans-serif;
}

.loader-container {
    display: flex;
    gap: 12px;
}

.dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f472b6 0%, #c084fc 50%, #6366f1 100%);
    animation: pulse 1.4s ease-in-out infinite;
}

.dot:nth-child(1) { animation-delay: 0s; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
    0%, 80%, 100% {
        transform: scale(0.6);
        opacity: 0.4;
    }
    40% {
        transform: scale(1);
        opacity: 1;
        box-shadow: 0 0 20px rgba(192, 132, 252, 0.6), 
                    0 0 40px rgba(99, 102, 241, 0.4);
    }
}

.loading-text {
    position: absolute;
    bottom: -50px;
    color: #71717a;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
}
</style>
</head>
<body>

<div class="loader-container">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
</div>

</body>
</html>
