<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Waveform Audio Loader">
<title>Waveform Audio Loader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0d0d12;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.waveform-loader {
    display: flex;
    gap: 4px;
    height: 60px;
    align-items: center;
}

.waveform-loader .bar {
    width: 6px;
    height: 100%;
    background: linear-gradient(to top, #06b6d4, #8b5cf6);
    border-radius: 3px;
    animation: wave 1.2s ease-in-out infinite;
}

.waveform-loader .bar:nth-child(1) { animation-delay: 0s; }
.waveform-loader .bar:nth-child(2) { animation-delay: 0.1s; }
.waveform-loader .bar:nth-child(3) { animation-delay: 0.2s; }
.waveform-loader .bar:nth-child(4) { animation-delay: 0.3s; }
.waveform-loader .bar:nth-child(5) { animation-delay: 0.4s; }
.waveform-loader .bar:nth-child(6) { animation-delay: 0.5s; }
.waveform-loader .bar:nth-child(7) { animation-delay: 0.4s; }
.waveform-loader .bar:nth-child(8) { animation-delay: 0.3s; }
.waveform-loader .bar:nth-child(9) { animation-delay: 0.2s; }
.waveform-loader .bar:nth-child(10) { animation-delay: 0.1s; }
.waveform-loader .bar:nth-child(11) { animation-delay: 0s; }

@keyframes wave {
    0%, 100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
}
</style>
</head>
<body>

<div class="waveform-loader">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</div>

</body>
</html>
