<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Dot Pulse Loader UI Component">
<title>Dot Pulse Loader</title>
<style>
body {
    background: #0a0a0e;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.dot-pulse {
    display: flex;
    gap: 8px;
}

.dot-pulse .dot {
    width: 12px;
    height: 12px;
    background: #8b5cf6;
    border-radius: 50%;
    animation: dot-pulse 1.4s ease-in-out infinite;
}

.dot-pulse .dot:nth-child(2) {
    animation-delay: 0.2s;
    background: #06b6d4;
}

.dot-pulse .dot:nth-child(3) {
    animation-delay: 0.4s;
    background: #f472b6;
}

@keyframes dot-pulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
}
</style>
</head>
<body>

<div class="dot-pulse">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
</div>

</body>
</html>
