<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Frosted Glass Stack Notification UI Component">
    <title>Frosted Glass Stack Notification</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #0a0a0f;
            font-family: 'Outfit', sans-serif;
            padding: 20px;
        }
        .notification-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 380px;
        }
        .toast {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px 18px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            box-shadow: 
                0 8px 32px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.1);
            animation: toast-enter 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(-10px) scale(0.98);
        }
        .toast:nth-child(1) { animation-delay: 0s; }
        .toast:nth-child(2) { animation-delay: 0.1s; }
        .toast:nth-child(3) { animation-delay: 0.2s; }
        
        @keyframes toast-enter {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .toast:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            border-color: rgba(255,255,255,0.18);
            transform: translateY(-2px);
            box-shadow: 
                0 12px 40px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .toast-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .toast-icon.success {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 4px 12px rgba(16,185,129,0.3);
        }
        .toast-icon.error {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            box-shadow: 0 4px 12px rgba(244,63,94,0.3);
        }
        .toast-icon.info {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .toast-content {
            flex: 1;
            min-width: 0;
        }
        .toast-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: 0.01em;
        }
        .toast-message {
            font-size: 12px;
            color: rgba(255,255,255,0.55);
            line-height: 1.4;
        }
        .toast-close {
            width: 28px;
            height: 28px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .toast-close:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
            border-color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="notification-stack">
        <div class="toast">
            <div class="toast-icon success">✓</div>
            <div class="toast-content">
                <div class="toast-title">Changes Saved</div>
                <div class="toast-message">Your preferences have been updated</div>
            </div>
            <button class="toast-close">×</button>
        </div>
        <div class="toast">
            <div class="toast-icon error">✕</div>
            <div class="toast-content">
                <div class="toast-title">Connection Failed</div>
                <div class="toast-message">Unable to reach the server</div>
            </div>
            <button class="toast-close">×</button>
        </div>
        <div class="toast">
            <div class="toast-icon info">ℹ</div>
            <div class="toast-content">
                <div class="toast-title">Update Available</div>
                <div class="toast-message">Version 2.1.0 is ready to install</div>
            </div>
            <button class="toast-close">×</button>
        </div>
    </div>
</body>
</html>
