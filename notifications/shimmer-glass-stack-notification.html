<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shimmer Glass Stack Notification UI Component">
    <title>Shimmer Glass Stack Notification</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #0c0c14 0%, #16161f 50%, #0c0c14 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 20px;
        }
        .notification-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 360px;
        }
        .toast {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 15px 18px;
            background: rgba(22, 22, 31, 0.7);
            border: 1px Solid rgba(255,255,255,0.06);
            border-radius: 16px;
            overflow: hidden;
            animation: shimmer-slide 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateX(-30px);
        }
        .toast:nth-child(1) { animation-delay: 0s; }
        .toast:nth-child(2) { animation-delay: 0.15s; }
        .toast:nth-child(3) { animation-delay: 0.3s; }
        
        @keyframes shimmer-slide {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .toast::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255,255,255,0.08) 50%,
                transparent 100%
            );
            animation: shimmer-effect 3s infinite;
        }
        
        @keyframes shimmer-effect {
            0% { left: -100%; }
            100% { left: 200%; }
        }
        .toast:hover {
            background: rgba(22, 22, 31, 0.9);
            border-color: rgba(255,255,255,0.12);
            transform: scale(1.02);
        }
        .toast:hover::before {
            animation: shimmer-effect 1.5s infinite;
        }
        .toast-accent {
            width: 4px;
            height: 36px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .toast-accent.success { background: linear-gradient(180deg, #22c55e, #16a34a); }
        .toast-accent.error { background: linear-gradient(180deg, #f43f5e, #e11d48); }
        .toast-accent.warning { background: linear-gradient(180deg, #f59e0b, #d97706); }
        .toast-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .toast-icon.success { background: rgba(34,197,94,0.15); color: #22c55e; }
        .toast-icon.error { background: rgba(244,63,94,0.15); color: #f43f5e; }
        .toast-icon.warning { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .toast-content { flex: 1; }
        .toast-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2px;
        }
        .toast-message {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        .toast-action {
            padding: 6px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px Solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toast-action:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="notification-stack">
        <div class="toast">
            <div class="toast-accent success"></div>
            <div class="toast-icon success">↑</div>
            <div class="toast-content">
                <div class="toast-title">Upload Complete</div>
                <div class="toast-message">All files synced successfully</div>
            </div>
            <button class="toast-action">View</button>
        </div>
        <div class="toast">
            <div class="toast-accent error"></div>
            <div class="toast-icon error">!</div>
            <div class="toast-content">
                <div class="toast-title">Security Alert</div>
                <div class="toast-message">New device login detected</div>
            </div>
            <button class="toast-action">Review</button>
        </div>
        <div class="toast">
            <div class="toast-accent warning"></div>
            <div class="toast-icon warning">⚡</div>
            <div class="toast-content">
                <div class="toast-title">Storage Warning</div>
                <div class="toast-message">80% used - upgrade soon</div>
            </div>
            <button class="toast-action">Upgrade</button>
        </div>
    </div>
</body>
</html>
