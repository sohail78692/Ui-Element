<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cinematic Glass Stack Notification UI Component">
    <title>Cinematic Glass Stack Notification</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(180deg, #08080c 0%, #0f0f17 50%, #08080c 100%);
            font-family: 'Manrope', sans-serif;
            padding: 20px;
        }
        .notification-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 380px;
        }
        .toast {
            position: relative;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px Solid rgba(255,255,255,0.05);
            border-radius: 20px;
            animation: cinematic-reveal 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }
        .toast:nth-child(1) { animation-delay: 0s; }
        .toast:nth-child(2) { animation-delay: 0.15s; }
        .toast:nth-child(3) { animation-delay: 0.3s; }
        
        @keyframes cinematic-reveal {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .toast::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .toast::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            border-radius: 0 0 20px 20px;
        }
        .toast:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            border-color: rgba(255,255,255,0.1);
            transform: translateY(-4px) scale(1.02);
        }
        .toast-image {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            object-fit: cover;
            position: relative;
            z-index: 1;
        }
        .toast-image-placeholder {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            position: relative;
            z-index: 1;
        }
        .success .toast-image-placeholder {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 6px 20px rgba(16,185,129,0.35);
        }
        .warning .toast-image-placeholder {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 6px 20px rgba(245,158,11,0.35);
        }
        .info .toast-image-placeholder {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            box-shadow: 0 6px 20px rgba(139,92,246,0.35);
        }
        .toast-content {
            flex: 1;
            position: relative;
            z-index: 1;
        }
        .toast-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        .toast-category {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6);
        }
        .toast-time {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
        }
        .toast-title {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 3px;
        }
        .toast-message {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="notification-stack">
        <div class="toast success">
            <div class="toast-image-placeholder">✓</div>
            <div class="toast-content">
                <div class="toast-meta">
                    <span class="toast-category">System</span>
                    <span class="toast-time">Just now</span>
                </div>
                <div class="toast-title">Backup Complete</div>
                <div class="toast-message">Your data has been securely backed up to cloud</div>
            </div>
        </div>
        <div class="toast warning">
            <div class="toast-image-placeholder">⚠</div>
            <div class="toast-content">
                <div class="toast-meta">
                    <span class="toast-category">Alert</span>
                    <span class="toast-time">2m ago</span>
                </div>
                <div class="toast-title">Session Expiring</div>
                <div class="toast-message">Your session will expire in 5 minutes</div>
            </div>
        </div>
        <div class="toast info">
            <div class="toast-image-placeholder">✨</div>
            <div class="toast-content">
                <div class="toast-meta">
                    <span class="toast-category">Update</span>
                    <span class="toast-time">1h ago</span>
                </div>
                <div class="toast-title">New Team Member</div>
                <div class="toast-message">Sarah joined the design team</div>
            </div>
        </div>
    </div>
</body>
</html>
