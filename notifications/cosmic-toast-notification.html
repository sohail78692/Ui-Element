<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" description="Cosmic Toast Notification UI Component">
    <title>Cosmic Toast Notification</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a12;
            font-family: 'Outfit', sans-serif;
        }
        
        .cosmic-toast {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: toast-appear 0.4s ease;
        }
        
        @keyframes toast-appear {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .toast-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.2), rgba(56, 189, 248, 0.2));
            border-radius: 12px;
            flex-shrink: 0;
        }
        
        .toast-icon svg {
            width: 24px;
            height: 24px;
            color: #34d399;
        }
        
        .toast-content {
            flex: 1;
        }
        
        .toast-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        
        .toast-message {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .toast-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .toast-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .cosmic-toast.success .toast-icon {
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.2), rgba(52, 211, 153, 0.1));
        }
        
        .cosmic-toast.success .toast-icon svg {
            color: #34d399;
        }
        
        .cosmic-toast.error .toast-icon {
            background: linear-gradient(135deg, rgba(248, 113, 113, 0.2), rgba(248, 113, 113, 0.1));
        }
        
        .cosmic-toast.error .toast-icon svg {
            color: #f87171;
        }
        
        .cosmic-toast.info .toast-icon {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.2), rgba(96, 165, 250, 0.1));
        }
        
        .cosmic-toast.info .toast-icon svg {
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="cosmic-toast success">
        <div class="toast-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <div class="toast-content">
            <div class="toast-title">Success</div>
            <div class="toast-message">Your changes have been saved successfully.</div>
        </div>
        <button class="toast-close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>
</body>
</html>
