<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Bubble Floating Menu UI Component">
<title>Bubble Floating Menu</title>
<style>
body {
    background: #0d0d12;
    padding: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

.bubble-menu {
    position: relative;
    display: flex;
    gap: 12px;
    padding: 16px;
    background: rgba(255,255,255,0.03);
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.06);
}

.bubble-menu .bubble {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
}

.bubble-menu .bubble::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--color), transparent);
    opacity: 0.2;
    transition: opacity 0.3s;
}

.bubble-menu .bubble:hover::before {
    opacity: 0.5;
}

.bubble-menu .bubble:hover {
    transform: translateY(-8px) scale(1.1);
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
}

.bubble-menu .bubble svg {
    width: 22px;
    height: 22px;
    fill: #fff;
    position: relative;
    z-index: 1;
}

.bubble-menu .bubble.home {
    --color: #f59e0b;
    background: linear-gradient(135deg, #f59e0b, #d97706);
}

.bubble-menu .bubble.search {
    --color: #06b6d4;
    background: linear-gradient(135deg, #06b6d4, #0891b2);
}

.bubble-menu .bubble.settings {
    --color: #8b5cf6;
    background: linear-gradient(135deg, #8b5cf6, #7c3aed);
}

.bubble-menu .bubble.profile {
    --color: #ec4899;
    background: linear-gradient(135deg, #ec4899, #db2777);
}
</style>
</head>
<body>

<div class="bubble-menu">
    <div class="bubble home">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    </div>
    <div class="bubble search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </div>
    <div class="bubble settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m11-7h-6m-6 0H1m17.4-4.6l-4.2 2.4m-6.4 3.6L4.8 7.4m2.8 7.2 2.4 4.2m6.4-3.6 4.2-2.4"/></svg>
    </div>
    <div class="bubble profile">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
</div>

</body>
</html>
