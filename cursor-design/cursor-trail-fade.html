<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Cursor Trail Fade UI Component">
<title>Cursor Trail Fade</title>
<style>
body {
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
    min-height: 100vh;
    margin: 0;
    cursor: none;
    display: flex;
    justify-content: center;
    align-items: center;
}

.content {
    text-align: center;
    color: rgba(255, 255, 255, 0.7);
    font-family: 'Segoe UI', system-ui, sans-serif;
}

.content h1 {
    font-size: 32px;
    font-weight: 300;
    margin-bottom: 10px;
    color: #fff;
}

.content p {
    font-size: 16px;
}

.cursor-main {
    position: fixed;
    width: 20px;
    height: 20px;
    border: 2px solid #8b5cf6;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
    z-index: 9999;
    mix-blend-mode: difference;
}

.cursor-dot {
    position: fixed;
    width: 6px;
    height: 6px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 9999;
}

.cursor-trail {
    position: fixed;
    width: 10px;
    height: 10px;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.8) 0%, rgba(139, 92, 246, 0) 70%);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 9998;
}

.trail-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9997;
}

.trail-point {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.6) 0%, rgba(6, 182, 212, 0.3) 50%, transparent 70%);
    transform: translate(-50%, -50%);
    animation: fadeTrail 0.8s ease-out forwards;
}

@keyframes fadeTrail {
    0% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.3);
    }
}

.ripple {
    position: absolute;
    border: 2px solid rgba(139, 92, 246, 0.5);
    border-radius: 50%;
    animation: rippleExpand 0.6s ease-out forwards;
    pointer-events: none;
}

@keyframes rippleExpand {
    0% {
        width: 0;
        height: 0;
        opacity: 1;
    }
    100% {
        width: 100px;
        height: 100px;
        opacity: 0;
        margin-left: -50px;
        margin-top: -50px;
    }
}
</style>
</head>
<body>

<div class="cursor-main" id="cursorMain"></div>
<div class="cursor-dot" id="cursorDot"></div>
<div class="trail-container" id="trailContainer"></div>

<div class="content">
    <h1>Move your cursor</h1>
    <p>Experience the fading trail effect</p>
</div>

<script>
const cursorMain = document.getElementById('cursorMain');
const cursorDot = document.getElementById('cursorDot');
const trailContainer = document.getElementById('trailContainer');

let lastX = 0;
let lastY = 0;
let isFirstMove = true;

document.addEventListener('mousemove', (e) => {
    const x = e.clientX;
    const y = e.clientY;
    
    cursorMain.style.left = x + 'px';
    cursorMain.style.top = y + 'px';
    cursorDot.style.left = x + 'px';
    cursorDot.style.top = y + 'px';
    
    if (!isFirstMove) {
        const trail = document.createElement('div');
        trail.className = 'trail-point';
        trail.style.left = x + 'px';
        trail.style.top = y + 'px';
        trailContainer.appendChild(trail);
        
        setTimeout(() => {
            trail.remove();
        }, 800);
        
        const colors = ['#8b5cf6', '#06b6d4', '#ec4899', '#10b981'];
        trail.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random() * colors.length)]} 0%, transparent 70%)`;
        
        if (Math.abs(x - lastX) > 30 || Math.abs(y - lastY) > 30) {
            createRipple(x, y);
        }
    }
    
    lastX = x;
    lastY = y;
    isFirstMove = false;
});

function createRipple(x, y) {
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    document.body.appendChild(ripple);
    
    setTimeout(() => {
        ripple.remove();
    }, 600);
}

document.addEventListener('mouseleave', () => {
    cursorMain.style.opacity = '0';
    cursorDot.style.opacity = '0';
});

document.addEventListener('mouseenter', () => {
    cursorMain.style.opacity = '1';
    cursorDot.style.opacity = '1';
});
</script>

</body>
</html>
