<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Morph Element</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d0d12;
        }
        .liquid-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .liquid-blob {
            position: absolute;
            width: 120px;
            height: 120px;
            filter: blur(25px);
            animation: morph-1 4s ease-in-out infinite;
        }
        .blob-1 {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        }
        .blob-2 {
            background: linear-gradient(135deg, #48dbfb, #5f27cd);
            border-radius: 60% 40% 30% 70% / 60% 40% 60% 40%;
            animation-delay: -2s;
            animation: morph-2 4s ease-in-out infinite;
        }
        .blob-3 {
            background: linear-gradient(135deg, #1dd1a1, #10ac84);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation-delay: -1s;
            animation: morph-3 4s ease-in-out infinite;
        }
        .liquid-core {
            position: relative;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                inset 0 0 30px rgba(255, 107, 107, 0.1),
                0 0 20px rgba(0, 0, 0, 0.3);
            z-index: 1;
        }
        .core-icon {
            font-size: 32px;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes morph-1 {
            0%, 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            33% { border-radius: 70% 30% 40% 60% / 60% 40% 50% 40%; }
            66% { border-radius: 30% 70% 60% 40% / 40% 60% 30% 70%; }
        }
        @keyframes morph-2 {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 40% 60% 40%; }
            33% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            66% { border-radius: 70% 30% 40% 60% / 60% 40% 50% 40%; }
        }
        @keyframes morph-3 {
            0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            33% { border-radius: 70% 30% 40% 60% / 60% 40% 50% 40%; }
            66% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div class="liquid-wrapper">
        <div class="liquid-blob blob-1"></div>
        <div class="liquid-blob blob-2"></div>
        <div class="liquid-blob blob-3"></div>
        <div class="liquid-core">
            <div class="core-icon">✨</div>
        </div>
    </div>
</body>
</html>
