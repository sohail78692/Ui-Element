<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rotating Cube</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            font-family: 'Orbitron', sans-serif;
            perspective: 1000px;
            overflow: hidden;
        }

        .scene {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
            animation: rotate-cube 12s infinite linear;
        }

        @keyframes rotate-cube {
            from { transform: rotateX(-20deg) rotateY(0deg); }
            to { transform: rotateX(-20deg) rotateY(360deg); }
        }

        .cube {
            position: absolute;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.8), rgba(59, 130, 246, 0.6));
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .face:nth-child(1) { transform: translateZ(100px); }
        .face:nth-child(2) { transform: rotateY(180deg) translateZ(100px); }
        .face:nth-child(3) { transform: rotateY(90deg) translateZ(100px); }
        .face:nth-child(4) { transform: rotateY(-90deg) translateZ(100px); }
        .face:nth-child(5) { transform: rotateX(90deg) translateZ(100px); }
        .face:nth-child(6) { transform: rotateX(-90deg) translateZ(100px); }

        .face:nth-child(1) { background: linear-gradient(135deg, rgba(168, 85, 247, 0.9), rgba(124, 58, 237, 0.7)); }
        .face:nth-child(2) { background: linear-gradient(135deg, rgba(236, 72, 153, 0.9), rgba(168, 85, 247, 0.7)); }
        .face:nth-child(3) { background: linear-gradient(135deg, rgba(34, 211, 238, 0.9), rgba(59, 130, 246, 0.7)); }
        .face:nth-child(4) { background: linear-gradient(135deg, rgba(34, 197, 94, 0.9), rgba(22, 163, 74, 0.7)); }
        .face:nth-child(5) { background: linear-gradient(135deg, rgba(251, 191, 36, 0.9), rgba(245, 158, 11, 0.7)); }
        .face:nth-child(6) { background: linear-gradient(135deg, rgba(249, 115, 22, 0.9), rgba(234, 88, 12, 0.7)); }

        .face::before {
            content: '';
            position: absolute;
            width: 60%;
            height: 60%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .corner-dots {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: translateZ(102px);
        }

        .corner-dots::before,
        .corner-dots::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px white;
        }

        .corner-dots::before {
            top: 20px;
            left: 20px;
        }

        .corner-dots::after {
            bottom: 20px;
            right: 20px;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%);
            animation: pulse-glow 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse-glow {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            animation: float-particle 3s ease-in-out infinite;
        }

        .particle:nth-child(1) { transform: translate3d(150px, 50px, 50px); animation-delay: 0s; }
        .particle:nth-child(2) { transform: translate3d(-150px, -50px, -50px); animation-delay: 0.5s; }
        .particle:nth-child(3) { transform: translate3d(50px, 150px, -50px); animation-delay: 1s; }
        .particle:nth-child(4) { transform: translate3d(-50px, -150px, 50px); animation-delay: 1.5s; }
        .particle:nth-child(5) { transform: translate3d(100px, -100px, 100px); animation-delay: 2s; }
        .particle:nth-child(6) { transform: translate3d(-100px, 100px, -100px); animation-delay: 2.5s; }

        @keyframes float-particle {
            0%, 100% { opacity: 0.3; transform: translate3d(var(--x, 0), var(--y, 0), var(--z, 0)); }
            50% { opacity: 1; }
        }

        .info {
            position: absolute;
            bottom: 50px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="scene">
        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
        <div class="cube">
            <div class="face">
                <span class="corner-dots"></span>
                ◈
            </div>
            <div class="face">◇</div>
            <div class="face">△</div>
            <div class="face">▽</div>
            <div class="face">○</div>
            <div class="face">●</div>
        </div>
    </div>
    <div class="info">DRAG TO INTERACT</div>
</body>
</html>
