<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Glassmorphism Profile Card UI Component">
<title>Glassmorphism Profile Card</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

.profile-card {
    position: relative;
    width: 340px;
    padding: 40px 32px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

.profile-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
    pointer-events: none;
}

.avatar {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 0 auto 20px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.name {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    margin: 0 0 8px;
}

.role {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.6);
    margin: 0 0 24px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 20px 0;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 24px;
}

.stat-item {
    text-align: center;
}

.stat-value {
    display: block;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
}

.stat-label {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.actions {
    display: flex;
    gap: 12px;
}

.btn {
    flex: 1;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
}

.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.btn-secondary:hover {
    background: rgba(255, 255, 255, 0.2);
}
</style>
</head>
<body>

<div class="profile-card">
    <div class="avatar">
        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200" alt="Profile">
    </div>
    <h2 class="name">Alex Morgan</h2>
    <p class="role">Creative Director</p>
    
    <div class="stats">
        <div class="stat-item">
            <span class="stat-value">2.4K</span>
            <span class="stat-label">Followers</span>
        </div>
        <div class="stat-item">
            <span class="stat-value">892</span>
            <span class="stat-label">Following</span>
        </div>
        <div class="stat-item">
            <span class="stat-value">48</span>
            <span class="stat-label">Projects</span>
        </div>
    </div>
    
    <div class="actions">
        <button class="btn btn-primary">Follow</button>
        <button class="btn btn-secondary">Message</button>
    </div>
</div>

</body>
</html>
