<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="File Tag Manager UI">
  <title>File Tag Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .tag {
      transition: all 0.2s ease;
    }

    .tag:hover {
      transform: translateY(-2px);
    }

    .tag-remove:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    .add-tag-btn {
      transition: all 0.2s ease;
    }

    .add-tag-btn:hover {
      border-color: #8b5cf6;
      color: #8b5cf6;
    }

    .tag-input {
      outline: none;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-50 p-6">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 border border-gray-100">
    <h2 class="text-xl font-bold text-gray-800 mb-4">File Tags</h2>

    <div class="flex flex-wrap gap-2 mb-4" id="tagContainer">
      <span class="tag inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-medium bg-blue-100 text-blue-700 border border-blue-200">
        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
          <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
        </svg>
        Documents
        <button class="tag-remove ml-1 w-4 h-4 rounded-full flex items-center justify-center text-blue-500 hover:text-red-500">×</button>
      </span>

      <span class="tag inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-medium bg-green-100 text-green-700 border border-green-200">
        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12a1 1 0 110 2h-3a1 1 0 01-1-1v-2a1 1 0 00-1-1H9a1 1 0 00-1 1v2a1 1 0 01-1 1H4a1 1 0 110-2V4zm3 1h2v2H7V5zm2 4H7v2h2V9zm2-4h2v2h-2V5zm2 4h-2v2h2V9z" clip-rule="evenodd"/>
        </svg>
        Images
        <button class="tag-remove ml-1 w-4 h-4 rounded-full flex items-center justify-center text-green-500 hover:text-red-500">×</button>
      </span>

      <span class="tag inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-medium bg-purple-100 text-purple-700 border border-purple-200">
        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
          <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
        </svg>
        Work
        <button class="tag-remove ml-1 w-4 h-4 rounded-full flex items-center justify-center text-purple-500 hover:text-red-500">×</button>
      </span>
    </div>

    <div class="flex items-center gap-2 p-2 bg-gray-50 rounded-xl border border-gray-200">
      <input type="text" placeholder="Add new tag..." class="tag-input flex-1 bg-transparent px-3 py-2 text-gray-700 placeholder-gray-400" id="tagInput">
      <button class="add-tag-btn px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg text-gray-600 text-sm font-medium" id="addTagBtn">Add</button>
    </div>

    <div class="mt-4 pt-4 border-t border-gray-100">
      <p class="text-xs text-gray-500">Click × to remove tags. Press Enter to add new tags.</p>
    </div>
  </div>

  <script>
    const tagContainer = document.getElementById('tagContainer');
    const tagInput = document.getElementById('tagInput');
    const addTagBtn = document.getElementById('addTagBtn');

    const colors = [
      { bg: 'bg-red-100', text: 'text-red-700', border: 'border-red-200', hover: 'hover:text-red-500' },
      { bg: 'bg-orange-100', text: 'text-orange-700', border: 'border-orange-200', hover: 'hover:text-orange-500' },
      { bg: 'bg-amber-100', text: 'text-amber-700', border: 'border-amber-200', hover: 'hover:text-amber-500' },
      { bg: 'bg-green-100', text: 'text-green-700', border: 'border-green-200', hover: 'hover:text-green-500' },
      { bg: 'bg-teal-100', text: 'text-teal-700', border: 'border-teal-200', hover: 'hover:text-teal-500' },
      { bg: 'bg-blue-100', text: 'text-blue-700', border: 'border-blue-200', hover: 'hover:text-blue-500' },
      { bg: 'bg-indigo-100', text: 'text-indigo-700', border: 'border-indigo-200', hover: 'hover:text-indigo-500' },
      { bg: 'bg-purple-100', text: 'text-purple-700', border: 'border-purple-200', hover: 'hover:text-purple-500' },
      { bg: 'bg-pink-100', text: 'text-pink-700', border: 'border-pink-200', hover: 'hover:text-pink-500' },
    ];

    function addTag(text) {
      const color = colors[Math.floor(Math.random() * colors.length)];
      const tag = document.createElement('span');
      tag.className = `tag inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-medium ${color.bg} ${color.text} ${color.border}`;
      tag.innerHTML = `
        ${text}
        <button class="tag-remove ml-1 w-4 h-4 rounded-full flex items-center justify-center ${color.hover}">×</button>
      `;
      tagContainer.appendChild(tag);
      attachRemoveListener(tag.querySelector('.tag-remove'));
    }

    function attachRemoveListener(btn) {
      btn.addEventListener('click', () => {
        btn.parentElement.remove();
      });
    }

    document.querySelectorAll('.tag-remove').forEach(btn => {
      attachRemoveListener(btn);
    });

    addTagBtn.addEventListener('click', () => {
      const text = tagInput.value.trim();
      if (text) {
        addTag(text);
        tagInput.value = '';
      }
    });

    tagInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const text = tagInput.value.trim();
        if (text) {
          addTag(text);
          tagInput.value = '';
        }
      }
    });
  </script>

</body>

</html>
