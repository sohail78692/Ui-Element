<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Space Grotesk', sans-serif;
            padding: 40px;
        }

        .upload-container {
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        .crystal-upload {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .crystal-upload::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(139, 92, 246, 0.1), transparent, rgba(236, 72, 153, 0.1), transparent);
            animation: rotate-shine 8s linear infinite;
            z-index: 0;
        }

        @keyframes rotate-shine {
            to { transform: rotate(360deg); }
        }

        .crystal-upload:hover {
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 
                0 0 60px rgba(139, 92, 246, 0.15),
                inset 0 0 40px rgba(139, 92, 246, 0.05);
        }

        .upload-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .upload-icon {
            width: 100px;
            height: 100px;
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            position: relative;
            transition: all 0.4s ease;
        }

        .upload-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .crystal-upload:hover .upload-icon::after {
            opacity: 1;
        }

        .crystal-upload:hover .upload-icon {
            transform: scale(1.05) rotate(-5deg);
        }

        .upload-icon svg {
            width: 44px;
            height: 44px;
            fill: url(#icon-gradient);
        }

        .upload-title {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }

        .upload-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 24px;
        }

        .upload-btn {
            padding: 16px 36px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .upload-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }

        .upload-btn:hover::before {
            opacity: 1;
        }

        .file-types {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .file-type {
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .drop-zone {
            position: absolute;
            inset: 0;
            border: 2px dashed rgba(139, 92, 246, 0.5);
            border-radius: 32px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .drop-zone.active {
            opacity: 1;
            background: rgba(139, 92, 246, 0.05);
        }

        .drop-text {
            font-size: 18px;
            font-weight: 600;
            color: #8b5cf6;
        }

        .upload-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .upload-progress.active {
            opacity: 1;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #ec4899);
            width: 0;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        svg defs {
            position: absolute;
            width: 0;
            height: 0;
        }

        .file-list {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 5;
        }

        .file-list.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .file-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-icon.image { background: linear-gradient(135deg, #34d399, #10b981); }
        .file-icon.doc { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .file-icon.video { background: linear-gradient(135deg, #f59e0b, #d97706); }

        .file-icon svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-size: 13px;
            color: #fff;
            font-weight: 500;
        }

        .file-size {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        .file-remove {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .file-remove:hover {
            background: rgba(239, 68, 68, 0.5);
        }

        .file-remove svg {
            width: 14px;
            height: 14px;
            fill: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <svg>
        <defs>
            <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#8b5cf6" />
                <stop offset="100%" stop-color="#ec4899" />
            </linearGradient>
        </defs>
    </svg>

    <div class="upload-container">
        <div class="crystal-upload" id="dropZone">
            <div class="drop-zone" id="dropOverlay">
                <span class="drop-text">Drop files here</span>
            </div>
            
            <div class="upload-content">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                </div>
                
                <h3 class="upload-title">Upload Files</h3>
                <p class="upload-subtitle">Drag and drop or click to browse</p>
                
                <button class="upload-btn">Browse Files</button>
                
                <div class="file-types">
                    <span class="file-type">PNG</span>
                    <span class="file-type">JPG</span>
                    <span class="file-type">PDF</span>
                    <span class="file-type">MP4</span>
                </div>
            </div>
            
            <div class="upload-progress" id="progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div class="file-list" id="fileList">
                <div class="file-item">
                    <div class="file-icon image">
                        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                    </div>
                    <div class="file-info">
                        <div class="file-name">photo.jpg</div>
                        <div class="file-size">2.4 MB</div>
                    </div>
                    <button class="file-remove">
                        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const dropOverlay = document.getElementById('dropOverlay');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const fileList = document.getElementById('fileList');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
            dropZone.addEventListener(event, e => {
                e.preventDefault();
                e.stopPropagation();
            });
        });

        ['dragenter', 'dragover'].forEach(event => {
            dropZone.addEventListener(event, () => {
                dropOverlay.classList.add('active');
            });
        });

        ['dragleave', 'drop'].forEach(event => {
            dropZone.addEventListener(event, () => {
                dropOverlay.classList.remove('active');
            });
        });

        dropZone.addEventListener('drop', e => {
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                simulateUpload();
            }
        });

        document.querySelector('.upload-btn').addEventListener('click', () => {
            simulateUpload();
        });

        function simulateUpload() {
            progress.classList.add('active');
            fileList.classList.remove('active');
            
            let width = 0;
            const interval = setInterval(() => {
                width += Math.random() * 15;
                if (width >= 100) {
                    width = 100;
                    clearInterval(interval);
                    
                    setTimeout(() => {
                        progress.classList.remove('active');
                        progressBar.style.width = '0';
                        fileList.classList.add('active');
                    }, 500);
                }
                progressBar.style.width = width + '%';
            }, 200);
        }
    </script>
</body>
</html>
