<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Pill Badge UI Component">
<title>Pill Badge</title>
<style>
body {
    background: #0d0d10;
    padding: 40px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 100vh;
}

.pill-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.pill-badge.primary {
    background: rgba(99, 102, 241, 0.15);
    color: #818cf8;
}

.pill-badge.success {
    background: rgba(34, 197, 94, 0.15);
    color: #4ade80;
}

.pill-badge.warning {
    background: rgba(245, 158, 11, 0.15);
    color: #fbbf24;
}

.pill-badge.danger {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
}
</style>
</head>
<body>

<span class="pill-badge primary">New</span>
<span class="pill-badge success">Active</span>
<span class="pill-badge warning">Pending</span>
<span class="pill-badge danger">Error</span>

</body>
</html>
