<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Action Button</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0f0f12;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .fab-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 1000;
        }

        .fab-main {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
            border: none;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 4px 20px rgba(99, 102, 241, 0.4),
                0 0 40px rgba(139, 92, 246, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(1);
        }

        .fab-main:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 
                0 8px 30px rgba(99, 102, 241, 0.5),
                0 0 60px rgba(139, 92, 246, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .fab-main svg {
            width: 28px;
            height: 28px;
            fill: white;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .fab-main.active svg {
            transform: rotate(135deg);
        }

        .fab-main.active {
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
        }

        .fab-items {
            position: absolute;
            bottom: 80px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            transform: translateY(20px) scale(0.8);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .fab-items.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .fab-item {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: #1e1e24;
            border: 1px solid #2d2d3a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .fab-item:hover {
            transform: translateX(-8px) scale(1.05);
            border-color: #6366f1;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
        }

        .fab-item svg {
            width: 22px;
            height: 22px;
            fill: #a1a1aa;
            transition: fill 0.3s ease;
        }

        .fab-item:hover svg {
            fill: #fff;
        }

        .fab-item::before {
            content: attr(data-label);
            position: absolute;
            right: 60px;
            background: #1e1e24;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.3s ease;
            border: 1px solid #2d2d3a;
        }

        .fab-item:hover::before {
            opacity: 1;
            transform: translateX(0);
        }

        .fab-item:nth-child(1) { background: linear-gradient(135deg, #10b981, #059669); }
        .fab-item:nth-child(2) { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .fab-item:nth-child(3) { background: linear-gradient(135deg, #f59e0b, #d97706); }

        .fab-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .fab-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple-animation 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="fab-backdrop" id="backdrop"></div>
    
    <div class="fab-container">
        <div class="fab-items" id="fabItems">
            <button class="fab-item" data-label="Upload File">
                <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
            </button>
            <button class="fab-item" data-label="New Project">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
            <button class="fab-item" data-label="Share">
                <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
            </button>
        </div>
        
        <button class="fab-main" id="fabMain">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
    </div>

    <script>
        const fabMain = document.getElementById('fabMain');
        const fabItems = document.getElementById('fabItems');
        const backdrop = document.getElementById('backdrop');

        fabMain.addEventListener('click', () => {
            fabMain.classList.toggle('active');
            fabItems.classList.toggle('open');
            backdrop.classList.toggle('active');
        });

        backdrop.addEventListener('click', () => {
            fabMain.classList.remove('active');
            fabItems.classList.remove('open');
            backdrop.classList.remove('active');
        });

        fabMain.addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            
            this.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        });
    </script>
</body>
</html>
