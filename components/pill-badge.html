<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pill Badges</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Poppins, sans-serif;
  }

  body {
    min-height: 100vh;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    padding: 40px;
  }

  .badge-group {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    max-width: 600px;
  }

  h2 {
    color: white;
    font-weight: 500;
    margin-bottom: 10px;
  }

  .pill-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s ease;
    cursor: default;
  }

  .pill-badge:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
  }

  .pill-badge .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .pill-badge.primary {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
  }

  .pill-badge.primary .dot {
    background: white;
  }

  .pill-badge.success {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
  }

  .pill-badge.success .dot {
    background: #b9fbfb;
  }

  .pill-badge.danger {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: white;
  }

  .pill-badge.danger .dot {
    background: #ffdde6;
  }

  .pill-badge.warning {
    background: linear-gradient(135deg, #fa709a, #fee140);
    color: #1a1a2e;
  }

  .pill-badge.warning .dot {
    background: #fff8e1;
  }

  .pill-badge.neutral {
    background: #3a3a5c;
    color: white;
  }

  .pill-badge.neutral .dot {
    background: #6b6b8d;
  }

  .pill-badge.outline.primary {
    background: transparent;
    border: 2px solid #667eea;
    color: #667eea;
  }

  .pill-badge.outline.success {
    background: transparent;
    border: 2px solid #4facfe;
    color: #4facfe;
  }

  .pill-badge.outline.danger {
    background: transparent;
    border: 2px solid #f5576c;
    color: #f5576c;
  }

  .pill-badge.small {
    padding: 5px 12px;
    font-size: 11px;
  }

  .pill-badge.small .dot {
    width: 6px;
    height: 6px;
  }

  .pill-badge.large {
    padding: 12px 24px;
    font-size: 15px;
  }

  .pill-badge.large .dot {
    width: 10px;
    height: 10px;
  }

  .pill-badge .icon {
    font-size: 14px;
  }

  .pill-badge.small .icon {
    font-size: 12px;
  }

  .pill-badge.large .icon {
    font-size: 16px;
  }

  .notification-badge {
    position: relative;
    display: inline-block;
  }

  .notification-badge .count {
    position: absolute;
    top: -8px;
    right: -8px;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    background: #f5576c;
    color: white;
    font-size: 11px;
    font-weight: 700;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .section {
    text-align: center;
  }
</style>
</head>
<body>

<div class="section">
  <h2>Solid Badges</h2>
  <div class="badge-group">
    <span class="pill-badge primary"><span class="dot"></span>Primary</span>
    <span class="pill-badge success"><span class="dot"></span>Success</span>
    <span class="pill-badge danger"><span class="dot"></span>Danger</span>
    <span class="pill-badge warning"><span class="dot"></span>Warning</span>
    <span class="pill-badge neutral"><span class="dot"></span>Neutral</span>
  </div>
</div>

<div class="section">
  <h2>With Icons</h2>
  <div class="badge-group">
    <span class="pill-badge primary"><span class="icon">🔔</span>Notifications</span>
    <span class="pill-badge success"><span class="icon">✓</span>Verified</span>
    <span class="pill-badge danger"><span class="icon">⚠</span>Alert</span>
    <span class="pill-badge warning"><span class="icon">⭐</span>Premium</span>
  </div>
</div>

<div class="section">
  <h2>Outline Badges</h2>
  <div class="badge-group">
    <span class="pill-badge outline primary"><span class="dot"></span>Primary</span>
    <span class="pill-badge outline success"><span class="dot"></span>Success</span>
    <span class="pill-badge outline danger"><span class="dot"></span>Danger</span>
  </div>
</div>

<div class="section">
  <h2>Size Variants</h2>
  <div class="badge-group">
    <span class="pill-badge primary small"><span class="dot"></span>Small</span>
    <span class="pill-badge primary"><span class="dot"></span>Medium</span>
    <span class="pill-badge primary large"><span class="dot"></span>Large</span>
  </div>
</div>

<div class="section">
  <h2>Notification Badge</h2>
  <div class="badge-group">
    <div class="notification-badge">
      <span class="pill-badge primary">Messages</span>
      <span class="count">5</span>
    </div>
    <div class="notification-badge">
      <span class="pill-badge danger">Alerts</span>
      <span class="count">12</span>
    </div>
  </div>
</div>

</body>
</html>
