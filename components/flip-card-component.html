<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Card Component</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d0d12;
            perspective: 1000px;
        }
        .flip-card {
            width: 280px;
            height: 180px;
            cursor: pointer;
        }
        .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card:hover .flip-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .flip-front {
            background: linear-gradient(145deg, #1a1a24, #141418);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .flip-front-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 12px;
        }
        .flip-front-text { color: rgba(255, 255, 255, 0.8); font-size: 16px; }
        .flip-back {
            background: linear-gradient(145deg, #8b5cf6, #6366f1);
            transform: rotateY(180deg);
            color: #fff;
            text-align: center;
            padding: 24px;
        }
        .flip-back-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .flip-back-text { font-size: 14px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="flip-card">
        <div class="flip-inner">
            <div class="flip-front">
                <div class="flip-front-icon">💳</div>
                <span class="flip-front-text">Credit Card</span>
            </div>
            <div class="flip-back">
                <div class="flip-back-title">Secure Payment</div>
                <div class="flip-back-text">Your card details are encrypted and secure.</div>
            </div>
        </div>
    </div>
</body>
</html>
