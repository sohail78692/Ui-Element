<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Avatar Stack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d0d12;
        }
        .avatar-stack {
            display: flex;
            align-items: center;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid #141418;
            margin-left: -12px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
        }
        .avatar:first-child { margin-left: 0; }
        .avatar:hover { transform: translateY(-5px); z-index: 10; }
        .avatar.more {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="avatar-stack">
        <div class="avatar">JD</div>
        <div class="avatar" style="background: linear-gradient(135deg, #3b82f6, #06b6d4);">AK</div>
        <div class="avatar" style="background: linear-gradient(135deg, #10b981, #34d399);">MK</div>
        <div class="avatar" style="background: linear-gradient(135deg, #f59e0b, #fbbf24);">+4</div>
    </div>
</body>
</html>
