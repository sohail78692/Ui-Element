<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Pop Testimonial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pop-yellow: #ffeb3b;
            --pop-pink: #ff4081;
            --pop-cyan: #00bcd4;
            --pop-black: #212121;
            --bg: #f0f0f0;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255, 64, 129, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 188, 212, 0.1) 0%, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }

        .comic-container {
            position: relative;
            width: 480px;
            max-width: 90vw;
            transform: rotate(-2deg);
            transition: transform 0.3s ease;
        }

        .comic-container:hover {
            transform: rotate(0deg) scale(1.02);
        }

        .comic-card {
            background: white;
            border: 4px solid var(--pop-black);
            border-radius: 12px;
            padding: 32px;
            position: relative;
            box-shadow: 12px 12px 0 var(--pop-black);
            transition: box-shadow 0.3s ease;
        }

        .comic-container:hover .comic-card {
            box-shadow: 8px 8px 0 var(--pop-black);
        }

        .comic-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 10% 10%, var(--pop-yellow) 8px, transparent 8px),
                radial-gradient(circle at 90% 90%, var(--pop-pink) 8px, transparent 8px);
            background-size: 40px 40px;
            opacity: 0.3;
            pointer-events: none;
            border-radius: 8px;
        }

        .speech-bubble {
            position: absolute;
            top: -30px;
            right: 20px;
            background: var(--pop-yellow);
            padding: 12px 20px;
            border-radius: 50px;
            border: 3px solid var(--pop-black);
            font-family: 'Bangers', cursive;
            font-size: 24px;
            color: var(--pop-black);
            transform: rotate(5deg);
            box-shadow: 4px 4px 0 var(--pop-black);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 20px;
            border: 10px solid transparent;
            border-top-color: var(--pop-black);
        }

        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 22px;
            border: 8px solid transparent;
            border-top-color: var(--pop-yellow);
            z-index: 1;
        }

        .quote-icon {
            width: 56px;
            height: 56px;
            margin-bottom: 20px;
            filter: drop-shadow(3px 3px 0 var(--pop-black));
        }

        .text {
            font-size: 20px;
            line-height: 1.6;
            color: var(--pop-black);
            margin-bottom: 28px;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .avatar-container {
            position: relative;
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--pop-black);
            box-shadow: 4px 4px 0 var(--pop-black);
        }

        .pop-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--pop-cyan);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 3px solid var(--pop-black);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 2px 2px 0 var(--pop-black);
        }

        .details h4 {
            margin: 0;
            font-size: 20px;
            color: var(--pop-black);
            font-weight: 700;
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
        }

        .details p {
            margin: 4px 0 0;
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .comic-stars {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
        }

        .star {
            font-size: 24px;
            color: var(--pop-yellow);
            text-shadow: 2px 2px 0 var(--pop-black);
            animation: star-pop 0.5s ease backwards;
        }

        .star:nth-child(1) { animation-delay: 0.1s; }
        .star:nth-child(2) { animation-delay: 0.2s; }
        .star:nth-child(3) { animation-delay: 0.3s; }
        .star:nth-child(4) { animation-delay: 0.4s; }
        .star:nth-child(5) { animation-delay: 0.5s; }

        @keyframes star-pop {
            0% {
                transform: scale(0) rotate(-180deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
            }
        }

        .action-lines {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
        }

        .action-line {
            width: 30px;
            height: 4px;
            background: var(--pop-black);
            border-radius: 2px;
        }

        .action-line:nth-child(2) {
            width: 20px;
            background: var(--pop-pink);
        }

        .action-line:nth-child(3) {
            width: 25px;
            background: var(--pop-cyan);
        }

        .bolt-decoration {
            position: absolute;
            top: 20px;
            left: -15px;
            font-size: 40px;
            color: var(--pop-yellow);
            text-shadow: 3px 3px 0 var(--pop-black);
            transform: rotate(-20deg);
        }
    </style>
</head>

<body>

    <div class="comic-container">
        <div class="speech-bubble">AWESOME!</div>
        <div class="comic-card">
            <div class="comic-pattern"></div>
            <div class="bolt-decoration">⚡</div>

            <div class="comic-stars">
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="star">★</span>
            </div>

            <svg class="quote-icon" fill="#212121" viewBox="0 0 24 24">
                <path d="M14.017 21L14.017 18C14.017 16.8954 14.9125 16 16.0171 16H19.0171C20.1217 16 21.0171 15.1046 21.0171 14V9C21.0171 7.89543 20.1217 7 19.0171 7H15.0171C13.9125 7 13.0171 7.89543 13.0171 9V15L13.0171 16V21H14.017Z"/>
                <path d="M1.01709 21L1.01709 18C1.01709 16.8954 1.91253 16 3.01709 16H6.01709C7.12166 16 8.01709 15.1046 8.01709 14V9C8.01709 7.89543 7.12166 7 6.01709 7H2.01709C0.912521 7 0.0170898 7.89543 0.0170898 9V15L0.0170898 16V21H1.01709Z"/>
            </svg>

            <p class="text">"The level of detail and responsiveness in this UI kit is incredible. It has completely transformed our development workflow and saved hundreds of hours!"</p>
            
            <div class="user-info">
                <div class="avatar-container">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=ComicUser" alt="User" class="avatar">
                    <div class="pop-badge">★</div>
                </div>
                <div class="details">
                    <h4>Sarah Jenkins</h4>
                    <p>Lead Developer, TechFlow</p>
                </div>
            </div>

            <div class="action-lines">
                <div class="action-line"></div>
                <div class="action-line"></div>
                <div class="action-line"></div>
            </div>
        </div>
    </div>

</body>

</html>
