<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Floating Layer Testimonial UI Component">
<title>Floating Layer Testimonial</title>
<style>
body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Georgia', serif;
}

.testimonial-card {
    position: relative;
    width: 380px;
    padding: 40px 35px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.testimonial-card::before {
    content: '"';
    position: absolute;
    top: 10px;
    left: 20px;
    font-size: 120px;
    color: rgba(255, 255, 255, 0.08);
    font-family: Georgia, serif;
    line-height: 1;
}

.testimonial-quote {
    position: relative;
    font-size: 18px;
    line-height: 1.7;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 28px;
    font-style: italic;
}

.testimonial-author {
    display: flex;
    align-items: center;
    gap: 15px;
}

.author-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.author-info h4 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
}

.author-info span {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.5);
}

.floating-layer {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    border-radius: 20px;
    pointer-events: none;
}

.layer {
    position: absolute;
    border-radius: 20px;
    animation: float 6s ease-in-out infinite;
}

.layer-1 {
    width: 95%;
    height: 95%;
    top: 2.5%;
    left: 2.5%;
    background: rgba(102, 126, 234, 0.08);
    animation-delay: 0s;
}

.layer-2 {
    width: 90%;
    height: 90%;
    top: 5%;
    left: 5%;
    background: rgba(118, 75, 162, 0.06);
    animation-delay: 1s;
}

.layer-3 {
    width: 85%;
    height: 85%;
    top: 7.5%;
    left: 7.5%;
    border: 1px solid rgba(255, 255, 255, 0.05);
    animation-delay: 2s;
}

@keyframes float {
    0%, 100% {
        transform: translateY(0) rotate(0deg);
    }
    50% {
        transform: translateY(-8px) rotate(1deg);
    }
}

.rating {
    display: flex;
    gap: 4px;
    margin-bottom: 15px;
}

.star {
    color: #fbbf24;
    font-size: 16px;
}
</style>
</head>
<body>

<div class="testimonial-card">
    <div class="floating-layer">
        <div class="layer layer-1"></div>
        <div class="layer layer-2"></div>
        <div class="layer layer-3"></div>
    </div>
    <div class="rating">
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
    </div>
    <p class="testimonial-quote">This product transformed how we work. The attention to detail is remarkable, and the support team is incredibly responsive. Highly recommended!</p>
    <div class="testimonial-author">
        <div class="author-avatar">SC</div>
        <div class="author-info">
            <h4>Sarah Chen</h4>
            <span>Product Designer at TechCorp</span>
        </div>
    </div>
</div>

</body>
</html>
