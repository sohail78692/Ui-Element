<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Quote Testimonial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8f7f4;
            font-family: 'Inter', sans-serif;
        }
        
        .testimonial-card {
            max-width: 520px;
            padding: 50px;
            background: #fff;
            border-radius: 2px;
            position: relative;
        }
        
        .quote-mark {
            position: absolute;
            top: 30px;
            left: 40px;
            font-family: 'Playfair Display', serif;
            font-size: 120px;
            color: #e8e6e1;
            line-height: 1;
            pointer-events: none;
        }
        
        .quote-content {
            position: relative;
            z-index: 1;
        }
        
        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 400;
            color: #1a1a1a;
            line-height: 1.7;
            margin-bottom: 35px;
            font-style: italic;
        }
        
        .quote-text::before {
            content: '"';
            display: inline;
        }
        
        .quote-text::after {
            content: '"';
            display: inline;
        }
        
        .author-section {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        
        .author-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .author-info {
            flex: 1;
        }
        
        .author-name {
            font-size: 15px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
            letter-spacing: -0.2px;
        }
        
        .author-role {
            font-size: 13px;
            color: #888;
            font-weight: 400;
        }
        
        .divider {
            width: 40px;
            height: 2px;
            background: #1a1a1a;
            margin-top: 25px;
            opacity: 0;
            transform: scaleX(0);
            transform-origin: left;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .testimonial-card:hover .divider {
            opacity: 1;
            transform: scaleX(1);
        }
        
        .rating {
            display: flex;
            gap: 4px;
            margin-top: 20px;
        }
        
        .star {
            width: 16px;
            height: 16px;
            fill: #1a1a1a;
            opacity: 0.2;
            transition: opacity 0.3s ease;
        }
        
        .star.filled {
            opacity: 1;
        }
        
        .testimonial-card:hover .star {
            animation: star-pop 0.3s ease forwards;
            animation-delay: calc(var(--i) * 0.05s);
        }
        
        @keyframes star-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        .testimonial-card {
            transition: box-shadow 0.4s ease;
        }
        
        .testimonial-card:hover {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }
        
        @media (max-width: 600px) {
            .testimonial-card {
                padding: 35px 25px;
                margin: 20px;
            }
            
            .quote-mark {
                font-size: 80px;
                top: 20px;
                left: 20px;
            }
            
            .quote-text {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="testimonial-card">
        <div class="quote-mark">"</div>
        <div class="quote-content">
            <p class="quote-text">Working with this team transformed our digital presence completely. Their attention to detail and creative approach exceeded every expectation we had.</p>
            <div class="author-section">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150&h=150&fit=crop&crop=face" alt="Sarah Chen" class="author-avatar">
                <div class="author-info">
                    <div class="author-name">Sarah Chen</div>
                    <div class="author-role">CEO, TechVision Inc</div>
                </div>
            </div>
            <div class="rating">
                <svg class="star filled" style="--i:0" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                <svg class="star filled" style="--i:1" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                <svg class="star filled" style="--i:2" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                <svg class="star filled" style="--i:3" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                <svg class="star filled" style="--i:4" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </div>
            <div class="divider"></div>
        </div>
    </div>
</body>
</html>
