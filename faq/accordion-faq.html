<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Accordion FAQ UI Component">
<title>Accordion FAQ</title>
<style>
body {
    background: #0a0a0e;
    padding: 40px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

.accordion {
    width: 400px;
}

.accordion-item {
    background: #14141c;
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
    border: 1px solid #2a2a3a;
}

.accordion-item .header {
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    color: #e2e8f0;
    font-size: 15px;
    font-weight: 500;
}

.accordion-item .header .icon {
    color: #8b5cf6;
    font-size: 18px;
    transition: transform 0.3s;
}

.accordion-item.active .header .icon {
    transform: rotate(45deg);
}

.accordion-item .content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
}

.accordion-item .content p {
    padding: 0 20px 16px;
    margin: 0;
    color: #888;
    font-size: 14px;
    line-height: 1.5;
}

.accordion-item.active .content {
    max-height: 100px;
}
</style>
</head>
<body>

<div class="accordion">
    <div class="accordion-item">
        <div class="header">
            <span>What is this product?</span>
            <span class="icon">+</span>
        </div>
        <div class="content">
            <p>A modern UI component library for building beautiful web applications with ease.</p>
        </div>
    </div>
</div>

</body>
</html>
