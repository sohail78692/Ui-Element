<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Floating Label Input UI Component">
<title>Floating Label Input</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');

body {
    background: #0a0a0f;
    padding: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
}

.input-group {
    position: relative;
    width: 320px;
}

.input-group input {
    width: 100%;
    padding: 20px 24px;
    background: #14141c;
    border: 2px solid #1e1e2a;
    border-radius: 14px;
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: all 0.3s ease;
}

.input-group label {
    position: absolute;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    color: #6b7280;
    font-size: 16px;
    pointer-events: none;
    transition: all 0.3s ease;
}

.input-group input:focus,
.input-group input:not(:placeholder-shown) {
    border-color: #06b6d4;
    background: #181824;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: 8px;
    transform: translateY(0);
    font-size: 12px;
    color: #06b6d4;
    background: #14141c;
    padding: 0 8px;
    border-radius: 4px;
}

.input-group .highlight-bar {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 3px;
    background: linear-gradient(90deg, #06b6d4, #8b5cf6);
    border-radius: 0 0 14px 14px;
    transition: all 0.4s ease;
    transform: translateX(-50%);
}

.input-group input:focus ~ .highlight-bar {
    width: 100%;
}
</style>
</head>
<body>

<div class="input-group">
    <input type="text" id="name" placeholder=" " autocomplete="off">
    <label for="name">Full Name</label>
    <div class="highlight-bar"></div>
</div>

</body>
</html>
