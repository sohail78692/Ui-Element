<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Notification Toast UI Component">
<title>Notification Toast</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap');

body {
    background: #0f0f14;
    padding: 60px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: 'Plus Jakarta Sans', sans-serif;
    gap: 16px;
    flex-direction: column;
}

.toast {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px;
    background: #18181f;
    border-radius: 14px;
    border: 1px solid #27272a;
    min-width: 340px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.toast:hover {
    transform: translateX(5px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
}

.toast .icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
}

.toast.success .icon {
    background: rgba(34, 197, 94, 0.15);
}

.toast.error .icon {
    background: rgba(239, 68, 68, 0.15);
}

.toast.warning .icon {
    background: rgba(245, 158, 11, 0.15);
}

.toast.info .icon {
    background: rgba(59, 130, 246, 0.15);
}

.toast .content {
    flex: 1;
}

.toast .content h4 {
    color: #f4f4f5;
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 4px;
}

.toast .content p {
    color: #71717a;
    font-size: 13px;
    margin: 0;
    line-height: 1.4;
}

.toast .close {
    color: #52525b;
    font-size: 18px;
    cursor: pointer;
    transition: color 0.2s ease;
    line-height: 1;
}

.toast .close:hover {
    color: #a1a1aa;
}

.toast.success .icon::before { content: '✓'; color: #22c55e; }
.toast.error .icon::before { content: '✕'; color: #ef4444; }
.toast.warning .icon::before { content: '!'; color: #f59e0b; }
.toast.info .icon::before { content: 'i'; color: #3b82f6; }

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}
</style>
</head>
<body>

<div class="toast success">
    <div class="icon"></div>
    <div class="content">
        <h4>Payment Successful</h4>
        <p>Your subscription has been activated</p>
    </div>
    <span class="close">×</span>
</div>

<div class="toast error">
    <div class="icon"></div>
    <div class="content">
        <h4>Connection Failed</h4>
        <p>Unable to connect to the server</p>
    </div>
    <span class="close">×</span>
</div>

<div class="toast warning">
    <div class="icon"></div>
    <div class="content">
        <h4>Storage Full</h4>
        <p>Consider upgrading your plan</p>
    </div>
    <span class="close">×</span>
</div>

<div class="toast info">
    <div class="icon"></div>
    <div class="content">
        <h4>New Update Available</h4>
        <p>Version 2.0 is ready to install</p>
    </div>
    <span class="close">×</span>
</div>

</body>
</html>
