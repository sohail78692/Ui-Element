<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Rating Widget</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a12;
        }
        .rating-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .cosmic-stars {
            display: flex;
            gap: 8px;
        }
        .star {
            font-size: 32px;
            cursor: pointer;
            color: #1a1a24;
            transition: all 0.3s ease;
            position: relative;
        }
        .star::before {
            content: '★';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .star.filled::before,
        .star.hovered::before {
            opacity: 1;
        }
        .star:hover {
            transform: scale(1.2);
        }
        .star.filled:hover {
            transform: scale(1.1);
        }
        .star-glow {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.4) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }
        .star.filled .star-glow,
        .star.hovered .star-glow {
            opacity: 1;
            animation: glow-pulse 1.5s ease-in-out infinite;
        }
        .star:nth-child(1) { transition-delay: 0ms; }
        .star:nth-child(2) { transition-delay: 50ms; }
        .star:nth-child(3) { transition-delay: 100ms; }
        .star:nth-child(4) { transition-delay: 150ms; }
        .star:nth-child(5) { transition-delay: 200ms; }
        .rating-count {
            font-family: system-ui, sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
        .rating-count span {
            color: #ffd700;
            font-weight: 600;
        }
        @keyframes glow-pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="rating-container">
        <div class="cosmic-stars">
            <div class="star filled"><div class="star-glow"></div></div>
            <div class="star filled"><div class="star-glow"></div></div>
            <div class="star filled"><div class="star-glow"></div></div>
            <div class="star filled"><div class="star-glow"></div></div>
            <div class="star"><div class="star-glow"></div></div>
        </div>
        <div class="rating-count">4.2 <span>(128 reviews)</span></div>
    </div>
    <script>
        const stars = document.querySelectorAll('.star');
        stars.forEach((star, index) => {
            star.addEventListener('mouseenter', () => {
                stars.forEach((s, i) => {
                    s.classList.toggle('hovered', i <= index);
                });
            });
            star.addEventListener('click', () => {
                stars.forEach((s, i) => {
                    s.classList.toggle('filled', i <= index);
                    s.classList.remove('hovered');
                });
            });
        });
        document.querySelector('.cosmic-stars').addEventListener('mouseleave', () => {
            stars.forEach(s => s.classList.remove('hovered'));
        });
    </script>
</body>
</html>
