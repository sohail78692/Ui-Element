<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Progress Stepper UI Component">
<title>Progress Stepper</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap');

body {
    background: #0c0c0f;
    padding: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

.stepper {
    display: flex;
    align-items: center;
    gap: 0;
}

.step {
    display: flex;
    align-items: center;
    position: relative;
}

.step .circle {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #27272a;
    border: 2px solid #3f3f46;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #71717a;
    font-size: 16px;
    font-weight: 700;
    transition: all 0.4s ease;
    position: relative;
    z-index: 1;
}

.step.completed .circle {
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    border-color: #22c55e;
    color: #fff;
    box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
}

.step.active .circle {
    background: #fff;
    border-color: #fff;
    color: #0c0c0f;
    box-shadow: 0 0 24px rgba(255, 255, 255, 0.3);
}

.step .label {
    position: absolute;
    top: 56px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    color: #52525b;
    font-size: 13px;
    font-weight: 600;
    transition: color 0.3s ease;
}

.step.active .label,
.step.completed .label {
    color: #e4e4e7;
}

.step .connector {
    width: 60px;
    height: 3px;
    background: #3f3f46;
    transition: background 0.4s ease;
}

.step.completed .connector {
    background: linear-gradient(90deg, #22c55e 0%, #22c55e 100%);
}

.step:last-child .connector {
    display: none;
}
</style>
</head>
<body>

<div class="stepper">
    <div class="step completed">
        <div class="circle">✓</div>
        <span class="label">Cart</span>
    </div>
    <div class="connector"></div>
    <div class="step completed">
        <div class="circle">✓</div>
        <span class="label">Shipping</span>
    </div>
    <div class="connector"></div>
    <div class="step active">
        <div class="circle">3</div>
        <span class="label">Payment</span>
    </div>
    <div class="connector"></div>
    <div class="step">
        <div class="circle">4</div>
        <span class="label">Review</span>
    </div>
</div>

</body>
</html>
