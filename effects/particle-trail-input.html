<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Trail Input</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050508;
            font-family: 'Segoe UI', sans-serif;
        }

        .input-wrapper {
            position: relative;
            width: 350px;
        }

        .particle-input {
            width: 100%;
            padding: 20px 25px;
            font-size: 16px;
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            outline: none;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            z-index: 2;
        }

        .particle-input::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, #00f5d4, #9b5de5, #f15bb5);
            border-radius: 18px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .particle-input:focus::before {
            opacity: 1;
        }

        .particle-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: transparent;
            box-shadow: 
                0 0 30px rgba(0, 245, 212, 0.2),
                0 0 60px rgba(155, 93, 229, 0.1);
        }

        .particle-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        @keyframes particleGlow {
            0%, 100% {
                box-shadow: 0 0 6px currentColor;
            }
            50% {
                box-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
            }
        }

        .glow-line {
            position: absolute;
            bottom: 20px;
            left: 25px;
            right: 25px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f5d4, #9b5de5, #f15bb5, transparent);
            border-radius: 2px;
            opacity: 0;
            transform: scaleX(0);
            transform-origin: left;
            transition: all 0.4s ease;
        }

        .particle-input:focus ~ .glow-line {
            opacity: 1;
            transform: scaleX(1);
        }

        .label {
            position: absolute;
            top: 50%;
            left: 25px;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 1;
        }

        .particle-input:focus ~ .label,
        .particle-input:not(:placeholder-shown) ~ .label {
            top: -10px;
            left: 15px;
            font-size: 12px;
            color: #00f5d4;
            background: #050508;
            padding: 0 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="input-wrapper">
        <input type="text" class="particle-input" placeholder=" " id="inputField">
        <label class="label" for="inputField">Search anything...</label>
        <div class="glow-line"></div>
    </div>

    <script>
        const input = document.getElementById('inputField');
        const wrapper = document.querySelector('.input-wrapper');
        const colors = ['#00f5d4', '#9b5de5', '#f15bb5', '#fee440', '#00bbf9'];

        input.addEventListener('input', (e) => {
            createParticles(e);
        });

        function createParticles(e) {
            const rect = input.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let i = 0; i < 3; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const color = colors[Math.floor(Math.random() * colors.length)];
                const angle = Math.random() * Math.PI * 2;
                const distance = 30 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.cssText = `
                    left: ${x}px;
                    top: ${y}px;
                    background: ${color};
                    color: ${color};
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    animation: particleFloat 0.8s ease-out forwards, particleGlow 0.5s ease-in-out infinite;
                `;
                
                wrapper.appendChild(particle);
                
                setTimeout(() => particle.remove(), 800);
            }
        }

        input.addEventListener('focus', () => {
            document.body.style.background = '#080810';
        });

        input.addEventListener('blur', () => {
            document.body.style.background = '#050508';
        });
    </script>
</body>
</html>
