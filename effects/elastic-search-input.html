<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Elastic Search Input UI Component">
<title>Elastic Search Input</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

body {
    background: #1a1a24;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 40px;
}

.search-container {
    position: relative;
    width: 100%;
    max-width: 420px;
}

.search-input {
    width: 100%;
    padding: 18px 56px 18px 24px;
    font-size: 16px;
    font-weight: 500;
    color: #e4e4e7;
    background: #27272f;
    border: 2px solid #3f3f46;
    border-radius: 16px;
    outline: none;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.search-input::placeholder {
    color: #71717a;
}

.search-input:focus {
    border-color: #8b5cf6;
    box-shadow: 0 0 0 6px rgba(139, 92, 246, 0.15), 0 8px 32px rgba(0, 0, 0, 0.3);
    transform: scale(1.02);
}

.search-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    border: 2.5px solid #71717a;
    border-radius: 50%;
    transition: all 0.3s ease;
    pointer-events: none;
}

.search-input:focus + .search-icon {
    border-color: #8b5cf6;
    transform: translateY(-50%) rotate(45deg);
}

.search-icon::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 2.5px;
    background: #8b5cf6;
    bottom: -2px;
    right: -4px;
    border-radius: 2px;
    transform: rotate(45deg);
    opacity: 0;
    transition: opacity 0.3s ease;
}

.search-input:focus + .search-icon::after {
    opacity: 1;
}

.suggestions {
    position: absolute;
    top: calc(100% + 12px);
    left: 0;
    right: 0;
    background: #27272f;
    border: 1px solid #3f3f46;
    border-radius: 14px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(-10px);
    pointer-events: none;
    transition: all 0.3s ease;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
}

.search-input:focus + .search-icon + .suggestions,
.search-container:focus-within .suggestions {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
}

.suggestion-item {
    padding: 14px 20px;
    color: #a1a1aa;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
}

.suggestion-item:hover {
    background: rgba(139, 92, 246, 0.1);
    color: #e4e4e7;
}

.suggestion-item svg {
    width: 16px;
    height: 16px;
    opacity: 0.6;
}
</style>
</head>
<body>

<div class="search-container">
    <input type="text" class="search-input" placeholder="Search anything...">
    <div class="search-icon"></div>
    <div class="suggestions">
        <div class="suggestion-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            Recent Searches
        </div>
        <div class="suggestion-item">Dashboard Analytics</div>
        <div class="suggestion-item">User Profile Settings</div>
        <div class="suggestion-item">Project Documentation</div>
    </div>
</div>

</body>
</html>
