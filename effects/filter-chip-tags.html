<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Filter Chip Tags UI Component">
<title>Filter Chip Tags</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600&display=swap');

body {
    background: #0b0b0e;
    padding: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Manrope', sans-serif;
    gap: 12px;
    flex-wrap: wrap;
    max-width: 400px;
}

.chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 100px;
    color: #a1a1aa;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
}

.chip:hover {
    background: #27272a;
    border-color: #3f3f46;
    color: #e4e4e7;
}

.chip.active {
    background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4);
}

.chip .count {
    background: rgba(255, 255, 255, 0.15);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
}

.chip:not(.active) .count {
    background: #3f3f46;
}

.chip .icon {
    font-size: 16px;
}
</style>
</head>
<body>

<span class="chip active">
    All
    <span class="count">128</span>
</span>

<span class="chip">
    <span class="icon">💻</span>
    Development
    <span class="count">45</span>
</span>

<span class="chip">
    <span class="icon">🎨</span>
    Design
    <span class="count">32</span>
</span>

<span class="chip">
    <span class="icon">📊</span>
    Marketing
    <span class="count">28</span>
</span>

<span class="chip">
    <span class="icon">📁</span>
    Files
    <span class="count">23</span>
</span>

<script>
document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
    });
});
</script>

</body>
</html>
