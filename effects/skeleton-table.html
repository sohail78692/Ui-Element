<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Skeleton Table UI Component">
<title>Skeleton Table</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

body {
    background: #0f0f12;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    font-family: 'Inter', sans-serif;
}

.skeleton-table {
    width: 100%;
    max-width: 900px;
    background: #18181b;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #27272a;
}

.skeleton-table-header {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr 100px;
    gap: 16px;
    padding: 20px 24px;
    background: #1f1f23;
    border-bottom: 1px solid #27272a;
}

.skeleton-header-cell {
    height: 14px;
    background: #27272a;
    border-radius: 4px;
    animation: pulse 1.5s ease-in-out infinite;
}

.skeleton-row {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr 100px;
    gap: 16px;
    padding: 18px 24px;
    border-bottom: 1px solid #27272a;
    align-items: center;
}

.skeleton-row:last-child {
    border-bottom: none;
}

.skeleton-avatar {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #27272a;
    animation: pulse 1.5s ease-in-out infinite;
}

.skeleton-text {
    height: 14px;
    background: #27272a;
    border-radius: 4px;
    animation: pulse 1.5s ease-in-out infinite;
}

.skeleton-text.short {
    width: 60%;
}

.skeleton-text.medium {
    width: 80%;
}

.skeleton-badge {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 20px;
    background: #27272a;
    animation: pulse 1.5s ease-in-out infinite;
}

.skeleton-badge.active {
    background: rgba(34, 197, 94, 0.15);
}

.skeleton-badge.pending {
    background: rgba(245, 158, 11, 0.15);
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}
</style>
</head>
<body>

<div class="skeleton-table">
    <div class="skeleton-table-header">
        <div class="skeleton-header-cell"></div>
        <div class="skeleton-header-cell"></div>
        <div class="skeleton-header-cell"></div>
        <div class="skeleton-header-cell"></div>
        <div class="skeleton-header-cell"></div>
    </div>
    
    <div class="skeleton-row">
        <div class="skeleton-avatar"></div>
        <div class="skeleton-text medium"></div>
        <div class="skeleton-text short"></div>
        <div class="skeleton-badge active"></div>
        <div class="skeleton-text"></div>
    </div>
    
    <div class="skeleton-row">
        <div class="skeleton-avatar"></div>
        <div class="skeleton-text medium"></div>
        <div class="skeleton-text short"></div>
        <div class="skeleton-badge pending"></div>
        <div class="skeleton-text"></div>
    </div>
    
    <div class="skeleton-row">
        <div class="skeleton-avatar"></div>
        <div class="skeleton-text medium"></div>
        <div class="skeleton-text short"></div>
        <div class="skeleton-badge active"></div>
        <div class="skeleton-text"></div>
    </div>
    
    <div class="skeleton-row">
        <div class="skeleton-avatar"></div>
        <div class="skeleton-text medium"></div>
        <div class="skeleton-text short"></div>
        <div class="skeleton-badge pending"></div>
        <div class="skeleton-text"></div>
    </div>
    
    <div class="skeleton-row">
        <div class="skeleton-avatar"></div>
        <div class="skeleton-text medium"></div>
        <div class="skeleton-text short"></div>
        <div class="skeleton-badge active"></div>
        <div class="skeleton-text"></div>
    </div>
</div>

</body>
</html>
