<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Stacking Card Gallery UI Component">
<title>Stacking Card Gallery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

body {
    background: #0c0c10;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'DM Sans', sans-serif;
}

.gallery-container {
    position: relative;
    width: 320px;
    height: 420px;
}

.card {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    background-size: cover;
    background-position: center;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.8) 100%);
}

.card-content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px;
    color: #fff;
    transform: translateY(20px);
    opacity: 0.8;
    transition: all 0.4s ease;
}

.card:hover .card-content {
    transform: translateY(0);
    opacity: 1;
}

.card-title {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 8px;
}

.card-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    margin: 0;
}

.card:nth-child(1) {
    background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600');
    z-index: 1;
}

.card:nth-child(2) {
    background-image: url('https://images.unsplash.com/photo-1557683316-973673baf926?w=600');
    z-index: 2;
    transform: translateX(30px) scale(0.9);
    opacity: 0.7;
}

.card:nth-child(3) {
    background-image: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=600');
    z-index: 3;
    transform: translateX(60px) scale(0.8);
    opacity: 0.5;
}

.gallery-container:hover .card:nth-child(1) {
    transform: translateX(-40px) scale(1.05);
    z-index: 3;
}

.gallery-container:hover .card:nth-child(2) {
    transform: translateX(0) scale(0.95);
    z-index: 2;
    opacity: 0.8;
}

.gallery-container:hover .card:nth-child(3) {
    transform: translateX(30px) scale(0.85);
    z-index: 1;
    opacity: 0.6;
}
</style>
</head>
<body>

<div class="gallery-container">
    <div class="card">
        <div class="card-content">
            <h3 class="card-title">Abstract Art</h3>
            <p class="card-desc">Vibrant colors and shapes</p>
        </div>
    </div>
    <div class="card">
        <div class="card-content">
            <h3 class="card-title">Gradient Flow</h3>
            <p class="card-desc">Smooth color transitions</p>
        </div>
    </div>
    <div class="card">
        <div class="card-content">
            <h3 class="card-title">Neon Dreams</h3>
            <p class="card-desc">Glowing night vibes</p>
        </div>
    </div>
</div>

</body>
</html>
