<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Animated Checkbox UI Component">
<title>Animated Checkbox</title>
<style>
body {
    background: #0b0b0f;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
}

.checkbox-wrapper input {
    display: none;
}

.checkbox-wrapper .box {
    width: 24px;
    height: 24px;
    background: #1a1a24;
    border: 2px solid #3a3a4a;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.checkbox-wrapper .box::after {
    content: '✓';
    color: #fff;
    font-size: 14px;
    opacity: 0;
    transform: scale(0);
    transition: all 0.2s ease;
}

.checkbox-wrapper input:checked + .box {
    background: #22c55e;
    border-color: #22c55e;
}

.checkbox-wrapper input:checked + .box::after {
    opacity: 1;
    transform: scale(1);
}

.checkbox-wrapper .label {
    color: #ccc;
    font-size: 15px;
}
</style>
</head>
<body>

<label class="checkbox-wrapper">
    <input type="checkbox" checked>
    <span class="box"></span>
    <span class="label">I agree to terms</span>
</label>

</body>
</html>
