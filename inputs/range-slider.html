<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Range Slider UI Component">
<title>Range Slider</title>
<style>
body {
    background: #0a0a0e;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.range-slider {
    width: 280px;
}

.range-slider input[type="range"] {
    width: 100%;
    height: 6px;
    background: #1e1e28;
    border-radius: 6px;
    outline: none;
    -webkit-appearance: none;
}

.range-slider input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(139, 92, 246, 0.4);
    transition: transform 0.2s;
}

.range-slider input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.1);
}

.range-slider .labels {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    color: #666;
    font-size: 12px;
}
</style>
</head>
<body>

<div class="range-slider">
    <input type="range" min="0" max="100" value="65">
    <div class="labels">
        <span>0</span>
        <span>100</span>
    </div>
</div>

</body>
</html>
