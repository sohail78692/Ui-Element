<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Neon Pulse Input UI Component">
<title>Neon Pulse Input</title>
<style>
body {
    background: #080810;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.neon-input {
    width: 300px;
    padding: 16px 20px;
    background: transparent;
    border: 2px solid #2a2a3a;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

.neon-input::placeholder {
    color: #555;
}

.neon-input:focus {
    outline: none;
    border-color: #22d3ee;
    box-shadow: 0 0 20px rgba(34, 211, 238, 0.2), inset 0 0 10px rgba(34, 211, 238, 0.05);
}

.neon-input:focus::placeholder {
    color: #22d3ee;
    opacity: 0.7;
}
</style>
</head>
<body>

<input type="text" class="neon-input" placeholder="Search anything...">

</body>
</html>
