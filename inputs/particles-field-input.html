<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particles Field Input</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }
        
        .particles-input-container {
            position: relative;
            width: 380px;
            height: 70px;
        }
        
        .particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .input-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
        }
        
        .particles-input {
            width: 100%;
            height: 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            padding: 0 25px;
            padding-left: 50px;
            font-size: 16px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            letter-spacing: 0.5px;
            outline: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        
        .particles-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.3s ease;
        }
        
        .particles-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(120, 80, 255, 0.5);
            box-shadow: 0 0 30px rgba(120, 80, 255, 0.15),
                        inset 0 0 20px rgba(120, 80, 255, 0.05);
        }
        
        .particles-input:focus::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }
        
        .input-icon {
            position: absolute;
            left: 18px;
            width: 20px;
            height: 20px;
            z-index: 2;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        
        .input-icon svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: rgba(255, 255, 255, 0.4);
            stroke-width: 1.5;
            transition: stroke 0.3s ease;
        }
        
        .particles-input:focus ~ .input-icon svg {
            stroke: #7850ff;
        }
        
        .particles-input:focus ~ .input-icon {
            transform: scale(1.1);
        }
        
        .glow-line {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #7850ff, transparent);
            border-radius: 2px;
            transition: width 0.4s ease;
            opacity: 0;
        }
        
        .particles-input:focus ~ .glow-line {
            width: 60%;
            opacity: 1;
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="particles-input-container">
        <canvas class="particles-canvas" id="particlesCanvas"></canvas>
        <div class="input-wrapper">
            <input type="text" class="particles-input" placeholder="Search anything...">
            <div class="input-icon">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
            </div>
            <div class="glow-line"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.querySelector('.particles-input-container');
        const input = document.querySelector('.particles-input');
        
        let particles = [];
        let animationId;
        let isFocused = false;
        
        function resizeCanvas() {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
        }
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.baseOpacity = this.opacity;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                
                if (!isFocused) {
                    this.opacity = Math.max(0, this.opacity - 0.005);
                    if (this.opacity <= 0) this.reset();
                } else {
                    this.opacity = Math.min(this.baseOpacity * 2, this.opacity + 0.01);
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(120, 80, 255, ${this.opacity})`;
                ctx.fill();
            }
        }
        
        function initParticles() {
            particles = [];
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle());
            }
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            if (isFocused) {
                particles.forEach(p => {
                    if (Math.random() < 0.02) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 1, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5})`;
                        ctx.fill();
                    }
                });
            }
            
            animationId = requestAnimationFrame(animate);
        }
        
        input.addEventListener('focus', () => {
            isFocused = true;
            particles.forEach(p => {
                p.baseOpacity = Math.random() * 0.5 + 0.3;
                p.opacity = p.baseOpacity;
            });
        });
        
        input.addEventListener('blur', () => {
            isFocused = false;
        });
        
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });
        
        resizeCanvas();
        initParticles();
        animate();
    </script>
</body>
</html>
