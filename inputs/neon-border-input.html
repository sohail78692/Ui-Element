<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Neon Border Input UI Component">
<title>Neon Border Input</title>
<style>
body {
    background: #0a0a0e;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.neon-input {
    position: relative;
    width: 280px;
}

.neon-input input {
    width: 100%;
    padding: 16px 20px;
    background: #13131a;
    border: 2px solid #2a2a3a;
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

.neon-input input::placeholder {
    color: #555;
}

.neon-input input:focus {
    border-color: #8b5cf6;
    box-shadow: 0 0 20px rgba(139, 92, 246, 0.3), inset 0 0 10px rgba(139, 92, 246, 0.1);
}

.neon-input .glow-line {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #8b5cf6, #06b6d4, #8b5cf6);
    transition: all 0.3s ease;
    transform: translateX(-50%);
    border-radius: 2px;
}

.neon-input input:focus ~ .glow-line {
    width: 100%;
}
</style>
</head>
<body>

<div class="neon-input">
    <input type="text" placeholder="Enter your username...">
    <span class="glow-line"></span>
</div>

</body>
</html>
