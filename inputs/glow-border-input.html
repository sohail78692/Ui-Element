<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Glow Border Input UI Component">
<title>Glow Border Input</title>
<style>
body {
    background: #0a0a0e;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.glow-input {
    width: 280px;
    padding: 14px 18px;
    background: #14141c;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 15px;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

.glow-input::placeholder {
    color: #4a4a5a;
}

.glow-input:focus {
    outline: none;
    border-color: #a855f7;
    box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15), 0 0 20px rgba(168, 85, 247, 0.1);
}
</style>
</head>
<body>

<input type="text" class="glow-input" placeholder="Username">

</body>
</html>
