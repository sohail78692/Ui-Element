<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Slide Toggle UI Component">
<title>Slide Toggle</title>
<style>
body {
    background: #0a0a0e;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.slide-toggle {
    position: relative;
    width: 52px;
    height: 28px;
    cursor: pointer;
}

.slide-toggle input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slide-toggle .track {
    position: absolute;
    inset: 0;
    background: #2a2a38;
    border-radius: 28px;
    transition: background 0.3s ease;
}

.slide-toggle .thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    background: #666;
    border-radius: 50%;
    transition: all 0.3s ease;
}

.slide-toggle input:checked + .track {
    background: linear-gradient(90deg, #22c55e, #16a34a);
}

.slide-toggle input:checked + .track .thumb {
    left: 27px;
    background: #fff;
}
</style>
</head>
<body>

<label class="slide-toggle">
    <input type="checkbox" checked>
    <span class="track">
        <span class="thumb"></span>
    </span>
</label>

</body>
</html>
