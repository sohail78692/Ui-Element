<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Checkbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            font-family: 'Segoe UI', sans-serif;
            flex-direction: column;
            gap: 25px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .neon-checkbox {
            position: relative;
            width: 60px;
            height: 28px;
            appearance: none;
            background: #1a1a2e;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .neon-checkbox::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: #444;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .neon-checkbox:checked {
            background: linear-gradient(90deg, #667eea, #764ba2);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.6), 0 0 40px rgba(102, 126, 234, 0.3);
        }

        .neon-checkbox:checked::before {
            transform: translateX(32px);
            background: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        .checkbox-label {
            color: #a0a0b0;
            font-size: 16px;
            font-weight: 500;
            user-select: none;
            transition: color 0.3s ease;
        }

        .checkbox-wrapper:hover .checkbox-label {
            color: #fff;
        }

        .neon-checkbox:focus {
            outline: none;
            box-shadow: 0 0 25px rgba(102, 126, 234, 0.8);
        }

        .toggle-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #12121a;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .toggle-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="toggle-group">
        <div class="toggle-title">Settings</div>
        
        <label class="checkbox-wrapper">
            <input type="checkbox" class="neon-checkbox" checked>
            <span class="checkbox-label">Enable Notifications</span>
        </label>

        <label class="checkbox-wrapper">
            <input type="checkbox" class="neon-checkbox">
            <span class="checkbox-label">Dark Mode</span>
        </label>

        <label class="checkbox-wrapper">
            <input type="checkbox" class="neon-checkbox" checked>
            <span class="checkbox-label">Auto Save</span>
        </label>

        <label class="checkbox-wrapper">
            <input type="checkbox" class="neon-checkbox">
            <span class="checkbox-label">Analytics</span>
        </label>
    </div>
</body>
</html>
