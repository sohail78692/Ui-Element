<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Glass Morph Input UI Component">
    <title>Glass Morph Input</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Outfit', sans-serif;
        }
        
        .glass-input-container {
            position: relative;
            width: 340px;
        }
        
        .glass-input {
            width: 100%;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            color: #fff;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }
        
        .glass-reflection {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            border-radius: 16px 16px 0 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .glass-input:focus ~ .glass-reflection {
            opacity: 1;
        }
        
        .input-label {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        
        .glass-input:focus ~ .input-label,
        .glass-input:not(:placeholder-shown) ~ .input-label {
            top: -10px;
            left: 16px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            background: #16213e;
            padding: 0 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="glass-input-container">
        <input type="text" class="glass-input" placeholder=" ">
        <div class="glass-reflection"></div>
        <label class="input-label">Your Email</label>
    </div>
</body>
</html>
