<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Distortion Modal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'DM Sans', sans-serif;
        }
        .trigger-btn {
            padding: 16px 36px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: white;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .trigger-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            z-index: 1000;
            backdrop-filter: blur(0px);
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
            backdrop-filter: blur(8px);
        }
        .modal-glass {
            position: relative;
            width: 90%;
            max-width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            transform: translateY(30px) scale(0.95);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal-glass {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
        .glass-noise {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }
        .modal-close:hover {
            background: rgba(255, 100, 100, 0.3);
            transform: rotate(90deg);
        }
        .modal-close::before,
        .modal-close::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 2px;
            background: white;
        }
        .modal-close::before { transform: rotate(45deg); }
        .modal-close::after { transform: rotate(-45deg); }
        .modal-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(59, 130, 246, 0.3));
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-title {
            color: white;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 12px;
        }
        .modal-content {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            line-height: 1.7;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-btn {
            padding: 12px 28px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .modal-btn.primary {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            border: none;
        }
        .modal-btn.primary:hover {
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
            transform: translateY(-1px);
        }
        .modal-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .modal-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <button class="trigger-btn" id="openModal">Open Glass Modal</button>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-glass">
            <div class="glass-noise"></div>
            <button class="modal-close" id="closeModal"></button>
            <div class="modal-icon">💎</div>
            <h2 class="modal-title">Premium Upgrade</h2>
            <p class="modal-content">Unlock exclusive features and remove all limitations with our premium plan.</p>
            <div class="modal-actions">
                <button class="modal-btn primary" id="confirmBtn">Upgrade Now</button>
                <button class="modal-btn secondary" id="cancelBtn">Maybe Later</button>
            </div>
        </div>
    </div>
    <script>
        const openBtn = document.getElementById('openModal');
        const closeBtn = document.getElementById('closeModal');
        const cancelBtn = document.getElementById('cancelBtn');
        const confirmBtn = document.getElementById('confirmBtn');
        const overlay = document.getElementById('modalOverlay');
        openBtn.addEventListener('click', () => {
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        });
        function closeModal() {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }
        closeBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);
        confirmBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
