<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morphing Modal</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            font-family: 'Syne', sans-serif;
            overflow: hidden;
        }

        .trigger-btn {
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            color: white;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
            position: relative;
            overflow: hidden;
        }

        .trigger-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .trigger-btn:hover::before {
            left: 100%;
        }

        .trigger-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.5);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: linear-gradient(145deg, #1a1a24, #12121a);
            border-radius: 30px;
            padding: 50px;
            max-width: 500px;
            width: 90%;
            position: relative;
            transform: scale(0.5) translateY(50px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255, 107, 107, 0.2);
            transform: rotate(90deg);
        }

        .modal-close::before,
        .modal-close::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 2px;
            background: rgba(255, 255, 255, 0.6);
        }

        .modal-close::before { transform: rotate(45deg); }
        .modal-close::after { transform: rotate(-45deg); }

        .modal-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            animation: icon-bounce 2s ease-in-out infinite;
        }

        @keyframes icon-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal h2 {
            color: white;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal p {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 14px 32px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            border: none;
        }

        .modal-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }

        .modal-btn.secondary {
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        .modal-btn.secondary:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }

        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: 30px;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }

        .shape:nth-child(1) {
            width: 200px;
            height: 200px;
            background: #ff6b6b;
            top: -50px;
            right: -50px;
            animation: float 6s ease-in-out infinite;
        }

        .shape:nth-child(2) {
            width: 150px;
            height: 150px;
            background: #feca57;
            bottom: -30px;
            left: -30px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        .success-checkmark {
            display: none;
        }

        .modal.success .modal-icon {
            background: linear-gradient(135deg, #10b981, #34d399);
        }

        .modal.success .modal-content {
            display: none;
        }

        .modal.success .success-checkmark {
            display: block;
            text-align: center;
        }

        .checkmark-circle {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #34d399);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: scale-in 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .checkmark-check {
            width: 30px;
            height: 50px;
            border-bottom: 4px solid white;
            border-right: 4px solid white;
            transform: rotate(45deg);
            margin-top: -5px;
            animation: check-draw 0.5s ease forwards 0.3s;
        }

        @keyframes scale-in {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        @keyframes check-draw {
            from { transform: rotate(45deg) scale(0); }
            to { transform: rotate(45deg) scale(1); }
        }

        .success-checkmark h2 {
            animation: fade-in 0.5s ease forwards 0.5s;
            opacity: 0;
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <button class="trigger-btn" id="openModal">Open Modal</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="floating-shapes">
                <div class="shape"></div>
                <div class="shape"></div>
            </div>
            
            <button class="modal-close" id="closeModal"></button>
            
            <div class="modal-content">
                <div class="modal-icon">✨</div>
                <h2>Welcome!</h2>
                <p>Experience the future of modal design with smooth animations and delightful interactions.</p>
                <div class="modal-actions">
                    <button class="modal-btn primary" id="confirmBtn">Get Started</button>
                    <button class="modal-btn secondary" id="cancelBtn">Maybe Later</button>
                </div>
            </div>

            <div class="success-checkmark">
                <div class="checkmark-circle">
                    <div class="checkmark-check"></div>
                </div>
                <h2>You're All Set!</h2>
            </div>
        </div>
    </div>

    <script>
        const openBtn = document.getElementById('openModal');
        const closeBtn = document.getElementById('closeModal');
        const cancelBtn = document.getElementById('cancelBtn');
        const confirmBtn = document.getElementById('confirmBtn');
        const overlay = document.getElementById('modalOverlay');
        const modal = document.getElementById('modal');

        function openModal() {
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            overlay.classList.remove('active');
            modal.classList.remove('success');
            document.body.style.overflow = '';
            
            setTimeout(() => {
                modal.querySelector('.modal-content').style.display = 'block';
                modal.querySelector('.success-checkmark').style.display = 'none';
            }, 300);
        }

        openBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);
        
        confirmBtn.addEventListener('click', () => {
            modal.classList.add('success');
            setTimeout(() => {
                closeModal();
            }, 2000);
        });

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
