<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Flip Toggle Switch UI Component">
<title>Flip Toggle Switch</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0d0d10;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
}

.flip-toggle {
    width: 140px;
    height: 70px;
    background: #1a1a22;
    border-radius: 35px;
    position: relative;
    cursor: pointer;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
    transition: background 0.4s ease;
}

.flip-toggle.active {
    background: linear-gradient(135deg, #10b981, #059669);
}

.flip-toggle .knob {
    position: absolute;
    top: 5px;
    left: 5px;
    width: 60px;
    height: 60px;
    background: linear-gradient(145deg, #2a2a36, #1e1e28);
    border-radius: 50%;
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
}

.flip-toggle.active .knob {
    left: 75px;
    background: linear-gradient(145deg, #ffffff, #e5e5e5);
}

.flip-toggle .knob::after {
    content: '○';
    font-size: 20px;
    color: #666;
    transition: all 0.3s;
}

.flip-toggle.active .knob::after {
    content: '●';
    color: #10b981;
}

.flip-toggle .labels {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 16px;
    align-items: center;
    pointer-events: none;
}

.flip-toggle .labels span {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.3s;
}

.flip-toggle .labels span:first-child {
    color: #10b981;
}

.flip-toggle .labels span:last-child {
    color: #444;
}

.flip-toggle.active .labels span:first-child {
    color: #444;
}

.flip-toggle.active .labels span:last-child {
    color: #10b981;
}
</style>
</head>
<body>

<div class="flip-toggle" onclick="this.classList.toggle('active')">
    <div class="labels">
        <span>On</span>
        <span>Off</span>
    </div>
    <div class="knob"></div>
</div>

</body>
</html>
