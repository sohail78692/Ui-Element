<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Signal Card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            gap: 24px;
            flex-wrap: wrap;
        }
        .signal-card {
            position: relative;
            padding: 24px;
            background: linear-gradient(145deg, #15151f, #0d0d14);
            border-radius: 16px;
            width: 200px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .signal-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 255, 136, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .signal-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .signal-card:hover::before {
            opacity: 1;
        }
        .signal-bar {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 40px;
            margin-bottom: 16px;
        }
        .bar {
            flex: 1;
            background: #1a1a24;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .bar.active {
            background: linear-gradient(180deg, #00ff88, #00cc6a);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        .bar:nth-child(1) { height: 20%; }
        .bar:nth-child(2) { height: 40%; }
        .bar:nth-child(3) { height: 60%; }
        .bar:nth-child(4) { height: 35%; }
        .bar:nth-child(5) { height: 70%; }
        .signal-card:hover .bar:nth-child(1) { height: 50%; }
        .signal-card:hover .bar:nth-child(2) { height: 70%; }
        .signal-card:hover .bar:nth-child(3) { height: 90%; }
        .signal-card:hover .bar:nth-child(4) { height: 60%; }
        .signal-card:hover .bar:nth-child(5) { height: 100%; }
        .signal-title {
            font-family: system-ui, sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        .signal-subtitle {
            font-family: system-ui, sans-serif;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        .signal-status {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
            animation: signal-blink 2s ease-in-out infinite;
        }
        @keyframes signal-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="signal-card">
        <div class="signal-status"></div>
        <div class="signal-bar">
            <div class="bar active"></div>
            <div class="bar active"></div>
            <div class="bar active"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div class="signal-title">Network Signal</div>
        <div class="signal-subtitle">Strong connection</div>
    </div>
    <div class="signal-card">
        <div class="signal-status" style="background:#ffaa00;box-shadow: 0 0 10px rgba(255,170,0,0.8);"></div>
        <div class="signal-bar">
            <div class="bar active" style="background:linear-gradient(180deg,#ffaa00,#ff8800);"></div>
            <div class="bar active" style="background:linear-gradient(180deg,#ffaa00,#ff8800);"></div>
            <div class="bar" style="background:#1a1a24;"></div>
            <div class="bar" style="background:#1a1a24;"></div>
            <div class="bar" style="background:#1a1a24;"></div>
        </div>
        <div class="signal-title">Wi-Fi Signal</div>
        <div class="signal-subtitle">Moderate strength</div>
    </div>
    <div class="signal-card">
        <div class="signal-status" style="background:#ff4444;box-shadow: 0 0 10px rgba(255,68,68,0.8);animation:none;"></div>
        <div class="signal-bar">
            <div class="bar" style="background:#1a1a24;"></div>
            <div class="bar" style="background:#1a1a24;"></div>
            <div class="bar" style="background:#1a1a24;"></div>
            <div class="bar" style="background:#1a1a24;"></div>
            <div class="bar" style="background:#1a1a24;"></div>
        </div>
        <div class="signal-title">Bluetooth</div>
        <div class="signal-subtitle">No device found</div>
    </div>
</body>
</html>
