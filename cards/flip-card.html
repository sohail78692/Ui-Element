<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Flip Card UI Component">
<title>Flip Card</title>
<style>
body {
    background: #0e0e12;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.flip-card {
    width: 280px;
    height: 180px;
    perspective: 1000px;
    cursor: pointer;
}

.flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}

.flip-card:hover .flip-card-inner {
    transform: rotateY(180deg);
}

.flip-card-front,
.flip-card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px;
    box-sizing: border-box;
}

.flip-card-front {
    background: linear-gradient(135deg, #1e1e2e, #2a2a3e);
    border: 1px solid #3a3a4e;
}

.flip-card-back {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    transform: rotateY(180deg);
}

.flip-card-front h3 {
    margin: 0;
    color: #fff;
    font-size: 20px;
}

.flip-card-front p {
    margin: 8px 0 0;
    color: #888;
    font-size: 14px;
}

.flip-card-back p {
    margin: 0;
    color: #fff;
    font-size: 14px;
    text-align: center;
}
</style>
</head>
<body>

<div class="flip-card">
    <div class="flip-card-inner">
        <div class="flip-card-front">
            <h3>Hover Me</h3>
            <p>Reveal the back</p>
        </div>
        <div class="flip-card-back">
            <p>3D flip animation reveals this content</p>
        </div>
    </div>
</div>

</body>
</html>
