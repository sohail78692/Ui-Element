<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Layer Profile Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'DM Sans', sans-serif;
        }
        
        .profile-card {
            position: relative;
            width: 320px;
            height: 420px;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .card-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .back-layer {
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 100%);
            z-index: 1;
        }
        
        .back-layer::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, #ff6b6b, transparent, #4ecdc4, transparent);
            animation: rotate 8s linear infinite;
            opacity: 0.3;
        }
        
        .back-layer::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 100%);
            border-radius: 21px;
        }
        
        @keyframes rotate {
            to { transform: rotate(360deg); }
        }
        
        .front-layer {
            background: linear-gradient(145deg, #252542 0%, #1e1e35 100%);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }
        
        .profile-card:hover .front-layer {
            transform: translateY(-20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }
        
        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin-bottom: 20px;
        }
        
        .avatar-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            animation: pulse-ring 2s ease-in-out infinite;
        }
        
        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #1e1e35;
            position: relative;
            z-index: 1;
        }
        
        .name {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        
        .role {
            font-size: 14px;
            color: #4ecdc4;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        
        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 25px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }
        
        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .action-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.5px;
        }
        
        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }
        
        .back-content {
            position: absolute;
            z-index: 0;
            inset: 3px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        
        .back-title {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .back-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            line-height: 1.6;
        }
        
        .social-links {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .social-link {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .social-link:hover {
            background: #4ecdc4;
            transform: translateY(-3px);
        }
        
        .social-link svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }
        
        .profile-card:hover .back-layer::before {
            animation-duration: 4s;
        }
    </style>
</head>
<body>

            <h2 class="name">Alex Morgan</h2>

            <div class="stats">

        </div>
    </div>
</body>
</html>
