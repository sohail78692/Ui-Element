<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Badge Notification UI Component">
<title>Badge Notification</title>
<style>
body {
    background: #0c0c10;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    gap: 24px;
}

.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
}

.badge.success {
    background: rgba(34,197,94,0.15);
    color: #22c55e;
    border: 1px solid rgba(34,197,94,0.3);
}

.badge.warning {
    background: rgba(234,179,8,0.15);
    color: #eab308;
    border: 1px solid rgba(234,179,8,0.3);
}

.badge.error {
    background: rgba(239,68,68,0.15);
    color: #ef4444;
    border: 1px solid rgba(239,68,68,0.3);
}

.badge.info {
    background: rgba(6,182,212,0.15);
    color: #06b6d4;
    border: 1px solid rgba(6,182,212,0.3);
}

.badge .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
}

.badge.success .dot {
    animation: pulse-success 2s ease-in-out infinite;
}

.badge.warning .dot {
    animation: pulse-warning 1.5s ease-in-out infinite;
}

@keyframes pulse-success {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

@keyframes pulse-warning {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}
</style>
</head>
<body>

<span class="badge success"><span class="dot"></span>Active</span>
<span class="badge warning"><span class="dot"></span>Pending</span>
<span class="badge error"><span class="dot"></span>Failed</span>
<span class="badge info"><span class="dot"></span>New</span>

</body>
</html>
