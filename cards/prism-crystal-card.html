<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Prism Crystal Card UI Component">
<title>Prism Crystal Card</title>
<style>
body {
    background: #0a0a12;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

.prism-card {
    width: 320px;
    padding: 28px;
    background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.prism-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.prism-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff3366, #ff6b35, #ffd93d, #6bcb77, #4d96ff, #9b5de5);
    background-size: 200% 100%;
    animation: prismShift 4s linear infinite;
}

@keyframes prismShift {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
}

.prism-card::after {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(155, 93, 229, 0.15) 0%, transparent 60%);
    pointer-events: none;
}

.prism-content {
    position: relative;
    z-index: 1;
}

.prism-badge {
    display: inline-block;
    padding: 6px 14px;
    background: linear-gradient(135deg, rgba(255,51,102,0.2), rgba(155,93,229,0.2));
    border: 1px solid rgba(255,51,102,0.3);
    border-radius: 20px;
    color: #ff6b9d;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
}

.prism-title {
    margin: 0 0 12px;
    color: #fff;
    font-size: 24px;
    font-weight: 700;
    line-height: 1.3;
}

.prism-desc {
    margin: 0 0 20px;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    line-height: 1.6;
}

.prism-stats {
    display: flex;
    gap: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
}

.prism-stat {
    text-align: center;
}

.prism-stat-value {
    display: block;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
}

.prism-stat-label {
    display: block;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
}
</style>
</head>
<body>

<div class="prism-card">
    <div class="prism-content">
        <span class="prism-badge">Premium</span>
        <h3 class="prism-title">Crystal Analytics</h3>
        <p class="prism-desc">Advanced data visualization with real-time insights and predictive analytics.</p>
        <div class="prism-stats">
            <div class="prism-stat">
                <span class="prism-stat-value">2.4K</span>
                <span class="prism-stat-label">Users</span>
            </div>
            <div class="prism-stat">
                <span class="prism-stat-value">98%</span>
                <span class="prism-stat-label">Accuracy</span>
            </div>
            <div class="prism-stat">
                <span class="prism-stat-value">24h</span>
                <span class="prism-stat-label">Updates</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
