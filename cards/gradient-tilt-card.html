<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Tilt Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f1a;
            font-family: 'Segoe UI', sans-serif;
        }

        .tilt-card {
            position: relative;
            width: 320px;
            height: 420px;
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
            cursor: pointer;
        }

        .tilt-card .gradient-border {
            position: absolute;
            inset: -3px;
            border-radius: 23px;
            background: linear-gradient(135deg, #ff00cc, #333399, #00ccff, #ff00cc);
            background-size: 300% 300%;
            animation: gradient-shift 4s ease infinite;
            z-index: -1;
            opacity: 0.7;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .tilt-card .card-content {
            transform: translateZ(30px);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .tilt-card .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            font-size: 36px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .tilt-card h2 {
            color: #fff;
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .tilt-card p {
            color: #a0a0b0;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .tilt-card .explore-btn {
            padding: 12px 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .tilt-card .explore-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <div class="tilt-card" id="tiltCard">
        <div class="gradient-border"></div>
        <div class="card-content">
            <div class="icon">✨</div>
            <h2>Premium</h2>
            <p>Experience the future of digital design with our innovative gradient tilt card component.</p>
            <button class="explore-btn">Explore Now</button>
        </div>
    </div>

    <script>
        const card = document.getElementById('tiltCard');
        
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = (y - centerY) / 15;
            const rotateY = (centerX - x) / 15;
            
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
        });
    </script>
</body>
</html>
