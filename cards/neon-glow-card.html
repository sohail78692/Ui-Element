<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Neon Glow Card UI Component">
<title>Neon Glow Card</title>
<style>
body {
    background: #08080c;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.neon-glow-card {
    width: 280px;
    padding: 28px;
    background: #12121a;
    border-radius: 16px;
    box-shadow: 0 0 0 1px #2a2a3a, 0 0 30px rgba(139, 92, 246, 0.1);
    transition: all 0.3s ease;
}

.neon-glow-card:hover {
    box-shadow: 0 0 0 1px #8b5cf6, 0 0 40px rgba(139, 92, 246, 0.3);
}

.neon-glow-card h3 {
    margin: 0 0 8px;
    color: #fff;
    font-size: 20px;
}

.neon-glow-card p {
    margin: 0;
    color: #777;
    font-size: 14px;
    line-height: 1.5;
}

.neon-glow-card .dot {
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    margin-bottom: 16px;
    box-shadow: 0 0 10px #22c55e;
}
</style>
</head>
<body>

<div class="neon-glow-card">
    <div class="dot"></div>
    <h3>Live Status</h3>
    <p>System operational and running smoothly</p>
</div>

</body>
</html>
