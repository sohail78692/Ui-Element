<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Holographic Edge Card UI Component">
<title>Holographic Edge Card</title>
<style>
body {
    background: #121218;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.holo-card {
    position: relative;
    width: 300px;
    padding: 28px;
    background: #1a1a24;
    border-radius: 20px;
    overflow: hidden;
}

.holo-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #f472b6, #8b5cf6, #06b6d4, #f472b6);
    background-size: 300% 100%;
    animation: holo-shimmer 3s linear infinite;
}

@keyframes holo-shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
}

.holo-card h3 {
    margin: 0 0 10px;
    color: #fff;
    font-size: 22px;
}

.holo-card p {
    margin: 0;
    color: #999;
    font-size: 14px;
    line-height: 1.5;
}

.holo-card .badge {
    display: inline-block;
    margin-bottom: 16px;
    padding: 6px 14px;
    background: rgba(139, 92, 246, 0.2);
    color: #a78bfa;
    font-size: 12px;
    font-weight: 600;
    border-radius: 20px;
}
</style>
</head>
<body>

<div class="holo-card">
    <span class="badge">PREMIUM</span>
    <h3>Holographic Card</h3>
    <p>An immersive card component with animated edge lighting effect.</p>
</div>

</body>
</html>
