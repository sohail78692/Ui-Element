<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Animated Stat Counter UI Component">
<title>Animated Stat Counter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');

body {
    background: #121218;
    padding: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    gap: 40px;
    font-family: 'Space Grotesk', sans-serif;
}

.stat-card {
    background: linear-gradient(145deg, #1a1a24 0%, #0d0d12 100%);
    border-radius: 20px;
    padding: 32px 40px;
    text-align: center;
    border: 1px solid #2a2a3a;
    transition: transform 0.3s ease, border-color 0.3s ease;
}

.stat-card:hover {
    transform: translateY(-5px);
    border-color: #4f46e5;
}

.stat-card .number {
    font-size: 56px;
    font-weight: 700;
    background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 12px;
}

.stat-card .label {
    color: #6b7280;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 500;
}

.stat-card .trend {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 16px;
    padding: 6px 12px;
    background: rgba(34, 197, 94, 0.1);
    border-radius: 20px;
    color: #22c55e;
    font-size: 13px;
    font-weight: 600;
}
</style>
</head>
<body>

<div class="stat-card">
    <div class="number" data-target="2847">0</div>
    <div class="label">Active Users</div>
    <div class="trend">↑ 12.5%</div>
</div>

<div class="stat-card">
    <div class="number" data-target="984" data-suffix="K">0</div>
    <div class="label">Revenue</div>
    <div class="trend">↑ 8.3%</div>
</div>

<div class="stat-card">
    <div class="number" data-target="156" data-suffix="%">0</div>
    <div class="label">Growth</div>
    <div class="trend">↑ 24.1%</div>
</div>

<script>
function animateCounters() {
    const counters = document.querySelectorAll('.number');
    
    counters.forEach(counter => {
        const target = parseInt(counter.getAttribute('data-target'));
        const suffix = counter.getAttribute('data-suffix') || '';
        const duration = 2000;
        const increment = target / (duration / 16);
        let current = 0;
        
        const updateCounter = () => {
            current += increment;
            if (current < target) {
                counter.textContent = Math.floor(current).toLocaleString() + suffix;
                requestAnimationFrame(updateCounter);
            } else {
                counter.textContent = target.toLocaleString() + suffix;
            }
        };
        
        updateCounter();
    });
}

document.addEventListener('DOMContentLoaded', animateCounters);
</script>

</body>
</html>
