<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Mesh Gradient Card UI Component">
<title>Mesh Gradient Card</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0a0a0f;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
}

.mesh-card {
    width: 320px;
    height: 200px;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
}

.mesh-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.3) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(255,255,255,0.2) 0%, transparent 40%);
    animation: meshMove 8s ease-in-out infinite;
}

.mesh-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.6) 100%);
}

.mesh-content {
    position: absolute;
    bottom: 24px;
    left: 24px;
    right: 24px;
    z-index: 1;
}

.mesh-content h3 {
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

.mesh-content p {
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    line-height: 1.5;
}

@keyframes meshMove {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(5%, 3%) rotate(2deg); }
    66% { transform: translate(-3%, 5%) rotate(-2deg); }
}
</style>
</head>
<body>

<div class="mesh-card">
    <div class="mesh-content">
        <h3>Abstract Flow</h3>
        <p>Dynamic mesh gradient with smooth color transitions</p>
    </div>
</div>

</body>
</html>
