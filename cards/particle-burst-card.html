<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Burst Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d0d12;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
        }

        .burst-card {
            position: relative;
            width: 320px;
            height: 420px;
            background: linear-gradient(145deg, #1a1a24, #12121a);
            border-radius: 24px;
            padding: 32px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .burst-card:hover {
            transform: translateY(-10px) scale(1.02);
        }

        .burst-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(139, 92, 246, 0.3), transparent, rgba(59, 130, 246, 0.3), transparent);
            animation: rotate-gradient 4s linear infinite;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .burst-card:hover::before {
            opacity: 1;
        }

        @keyframes rotate-gradient {
            to { transform: rotate(360deg); }
        }

        .card-content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .icon-wrapper {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.7;
            flex-grow: 1;
        }

        .action-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: auto;
            padding-top: 20px;
        }

        .action-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5);
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .particle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #8b5cf6;
            border-radius: 50%;
            opacity: 0;
        }

        .burst-card:hover .particle {
            animation: particle-burst 1s ease-out forwards;
        }

        @keyframes particle-burst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        .particle:nth-child(1) { --tx: -80px; --ty: -120px; left: 50%; top: 50%; }
        .particle:nth-child(2) { --tx: 80px; --ty: -100px; left: 50%; top: 50%; }
        .particle:nth-child(3) { --tx: -100px; --ty: 0px; left: 50%; top: 50%; }
        .particle:nth-child(4) { --tx: 100px; --ty: 20px; left: 50%; top: 50%; }
        .particle:nth-child(5) { --tx: -60px; --ty: 100px; left: 50%; top: 50%; }
        .particle:nth-child(6) { --tx: 60px; --ty: 120px; left: 50%; top: 50%; }
        .particle:nth-child(7) { --tx: 0px; --ty: -140px; left: 50%; top: 50%; }
        .particle:nth-child(8) { --tx: 0px; --ty: 140px; left: 50%; top: 50%; }

        .glow-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            border: 2px solid transparent;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .burst-card:hover .glow-ring {
            opacity: 1;
            border-color: rgba(139, 92, 246, 0.5);
            animation: ring-pulse 2s ease-in-out infinite;
        }

        @keyframes ring-pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="burst-card">
        <div class="glow-ring"></div>
        <div class="particle-container">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
        <div class="card-content">
            <div class="icon-wrapper">⚡</div>
            <h2 class="card-title">Lightning Core</h2>
            <p class="card-description">
                Experience the power of instant data processing with our lightning-fast core technology. Built for speed, designed for scale.
            </p>
            <div class="action-row">
                <button class="action-btn">Get Started</button>
                <button class="icon-btn">→</button>
            </div>
        </div>
    </div>
</body>
</html>
