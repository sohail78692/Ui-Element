<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromatic Shift Badge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f13;
            gap: 16px;
            flex-wrap: wrap;
            padding: 20px;
        }
        .chromatic-badge {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #1a1a1f;
            border-radius: 50px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            overflow: hidden;
        }
        .chromatic-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, #ff0080, #00ff80, #8000ff, #ff0080);
            background-size: 300% 100%;
            opacity: 0.15;
            animation: chromatic-flow 3s linear infinite;
        }
        .chromatic-badge::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            padding: 1px;
            background: linear-gradient(90deg, #ff0080, #00ff80, #8000ff);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: chromatic-flow 3s linear infinite;
        }
        .chromatic-badge.new {
            color: #00ff80;
        }
        .chromatic-badge.hot {
            color: #ff6b35;
        }
        .chromatic-badge.sale {
            color: #ffd700;
        }
        .chromatic-badge.limited {
            color: #ff0080;
        }
        .icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes chromatic-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
    </style>
</head>
<body>
    <div class="chromatic-badge new">
        <span class="icon">★</span>
        New Arrival
    </div>
    <div class="chromatic-badge hot">
        <span class="icon">🔥</span>
        Hot
    </div>
    <div class="chromatic-badge sale">
        <span class="icon">⚡</span>
        Sale
    </div>
    <div class="chromatic-badge limited">
        <span class="icon">◆</span>
        Limited
    </div>
</body>
</html>
