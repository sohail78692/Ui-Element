<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Shimmer Badge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            font-family: 'Outfit', sans-serif;
            gap: 40px;
            flex-wrap: wrap;
            padding: 40px;
        }

        .badge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .badge-label {
            color: #8892b0;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chrome-badge {
            position: relative;
            padding: 12px 28px;
            border-radius: 50px;
            background: linear-gradient(
                135deg,
                #e8e8e8 0%,
                #c0c0c0 25%,
                #e8e8e8 50%,
                #a8a8a8 75%,
                #e8e8e8 100%
            );
            background-size: 300% 300%;
            animation: chromeShimmer 3s ease infinite;
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.8),
                inset 0 -1px 0 rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .chrome-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.6),
                transparent
            );
            animation: lightSweep 2.5s ease-in-out infinite;
        }

        .chrome-badge::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 10%;
            right: 10%;
            height: 40%;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.7),
                transparent
            );
            border-radius: 50% 50% 40% 40%;
        }

        .badge-text {
            position: relative;
            z-index: 1;
            color: #1a1a2e;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        @keyframes chromeShimmer {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes lightSweep {
            0% {
                left: -100%;
            }
            50%, 100% {
                left: 100%;
            }
        }

        .gold-badge {
            background: linear-gradient(
                135deg,
                #ffd700 0%,
                #ffb700 25%,
                #ffc800 50%,
                #b8860b 75%,
                #ffd700 100%
            );
            background-size: 300% 300%;
            animation: chromeShimmer 3s ease infinite;
        }

        .gold-badge .badge-text {
            color: #3d2e00;
        }

        .rose-badge {
            background: linear-gradient(
                135deg,
                #ffc0cb 0%,
                #ff91a4 25%,
                #ffc0cb 50%,
                #db7093 75%,
                #ffc0cb 100%
            );
            background-size: 300% 300%;
            animation: chromeShimmer 3s ease infinite;
        }

        .rose-badge .badge-text {
            color: #4a1a2e;
        }

        .teal-badge {
            background: linear-gradient(
                135deg,
                #7fffd4 0%,
                #5fceba 25%,
                #7fffd4 50%,
                #3d9a8a 75%,
                #7fffd4 100%
            );
            background-size: 300% 300%;
            animation: chromeShimmer 3s ease infinite;
        }

        .teal-badge .badge-text {
            color: #1a3d35;
        }

        .small-badge {
            padding: 8px 18px;
        }

        .small-badge .badge-text {
            font-size: 11px;
        }

        .large-badge {
            padding: 16px 36px;
        }

        .large-badge .badge-text {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="badge-container">
        <span class="badge-label">Silver</span>
        <div class="chrome-badge">
            <span class="badge-text">Premium</span>
        </div>
    </div>

    <div class="badge-container">
        <span class="badge-label">Small</span>
        <div class="chrome-badge small-badge">
            <span class="badge-text">New</span>
        </div>
    </div>

    <div class="badge-container">
        <span class="badge-label">Large</span>
        <div class="chrome-badge large-badge">
            <span class="badge-text">Featured</span>
        </div>
    </div>

    <div class="badge-container">
        <span class="badge-label">Gold</span>
        <div class="chrome-badge gold-badge">
            <span class="badge-text">Winner</span>
        </div>
    </div>

    <div class="badge-container">
        <span class="badge-label">Rose</span>
        <div class="chrome-badge rose-badge">
            <span class="badge-text">Love</span>
        </div>
    </div>

    <div class="badge-container">
        <span class="badge-label">Teal</span>
        <div class="chrome-badge teal-badge">
            <span class="badge-text">Fresh</span>
        </div>
    </div>
</body>
</html>
