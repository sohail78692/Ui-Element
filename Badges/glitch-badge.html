<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" description="Glitch Badge UI Component">
<title>Glitch Badge</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a0a0f;
    gap: 24px;
    flex-wrap: wrap;
    padding: 40px;
}

.glitch-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: linear-gradient(90deg, rgba(0,255,200,0.1), rgba(255,0,128,0.1));
    border: 1px solid rgba(0,255,200,0.3);
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: 700;
    color: #00ffc8;
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
}

.glitch-badge::before {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, rgba(0,255,200,0.1), rgba(255,0,128,0.1));
    color: #ff0080;
    clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
    transform: translateX(-4px);
    opacity: 0.8;
    animation: glitch1 2s infinite linear alternate-reverse;
}

.glitch-badge::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, rgba(0,255,200,0.1), rgba(255,0,128,0.1));
    color: #00ffc8;
    clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
    transform: translateX(4px);
    opacity: 0.8;
    animation: glitch2 3s infinite linear alternate-reverse;
}

@keyframes glitch1 {
    0%, 100% { transform: translateX(-4px); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(-2px); }
    75% { transform: translateX(-5px); }
}

@keyframes glitch2 {
    0%, 100% { transform: translateX(4px); }
    25% { transform: translateX(2px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(3px); }
}

.glitch-badge.alert {
    border-color: rgba(255,200,0,0.3);
    color: #ffc800;
    background: linear-gradient(90deg, rgba(255,200,0,0.1), rgba(255,100,0,0.1));
}

.glitch-badge.alert::before {
    color: #ff6400;
}

.glitch-badge.vintage {
    border-color: rgba(255,150,50,0.3);
    color: #ff9632;
    background: linear-gradient(90deg, rgba(255,150,50,0.1), rgba(255,200,100,0.1));
    border-radius: 2px;
}

.glitch-badge.vintage::before {
    color: #ff6432;
}
</style>
</head>
<body>

<div class="glitch-badge" data-text="New">New</div>
<div class="glitch-badge alert" data-text="Alert">Alert</div>
<div class="glitch-badge vintage" data-text="Beta">Beta</div>

</body>
</html>
